<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Todo">
<title>Todo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23A8200E'/><path d='M7 17l5 5L25 10' stroke='%23F5E8C8' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%23A8200E'/><path d='M38 96l30 30L142 54' stroke='%23F5E8C8' stroke-width='16' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif;background:#1A0E06;color:#1A0E06;display:flex;flex-direction:column}
body.dk{color:#F0E4CC}
input,textarea,button,select{font-family:inherit}

/* Login */
#ls{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(20px)}
#ls.hidden{display:none}
.lcard{background:rgba(255,255,255,.96);border-radius:22px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
body.dk .lcard{background:rgba(20,12,4,.96);border:1px solid rgba(255,255,255,.1)}
.lseal{width:56px;height:56px;background:#A8200E;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#F5E8C8;font-size:28px;font-weight:700;margin:0 auto 1.2rem;box-shadow:3px 3px 0 rgba(0,0,0,.2)}
.ltitle{font-size:22px;font-weight:700;margin-bottom:.4rem;color:#1A0E06}
body.dk .ltitle{color:#F0E4CC}
.lsub{font-size:13px;opacity:.5;margin-bottom:1.8rem;line-height:1.5}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:12px;border:1.5px solid rgba(0,0,0,.12);background:white;cursor:pointer;font-size:14px;font-weight:600;color:#1A0E06;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.gbtn:hover{background:#f5f5f5;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.glogo{width:20px;height:20px}
.lnote{font-size:11px;opacity:.4;margin-top:1rem}

/* Sync */
#sb{position:fixed;top:0;left:0;right:0;z-index:200;height:2px;background:transparent;transition:background .3s}
#sb.syncing{background:linear-gradient(90deg,#A8200E,#F08030,#A8200E);background-size:200%;animation:sa 1.2s infinite}
#sb.ok{background:#2A5C38}
@keyframes sa{0%{background-position:0%}100%{background-position:200%}}

/* XP toast */
#xp-toast{position:fixed;top:calc(env(safe-area-inset-top) + 60px);left:50%;transform:translateX(-50%) translateY(-80px);background:#A8200E;color:#F5E8C8;font-size:13px;font-weight:700;padding:8px 18px;border-radius:20px;z-index:300;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;white-space:nowrap}
#xp-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

#bg{position:fixed;inset:0;z-index:0}
#bg svg{width:100%;height:100%;display:block}
.g{background:rgba(255,255,255,.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.65);box-shadow:0 2px 16px rgba(0,0,0,.08)}
body.dk .g{background:rgba(8,4,2,.68);border-color:rgba(255,255,255,.10)}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;width:100%}
#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding:0 .85rem;padding-bottom:calc(5.5rem + env(safe-area-inset-bottom));padding-top:calc(.8rem + env(safe-area-inset-top));display:none}
.view.active{display:block}
.view::-webkit-scrollbar{display:none}

/* Nav */
.bnav{position:relative;z-index:10;flex-shrink:0;display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom);border-top:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
body.dk .bnav{border-top-color:rgba(255,255,255,.1);background:rgba(8,4,2,.82)}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:9px 2px 10px;cursor:pointer;border:none;background:transparent;color:inherit;opacity:.38;transition:opacity .15s;font-size:9px;font-weight:600;min-height:52px;letter-spacing:.02em}
.ntab .ni{font-size:22px;line-height:1}
.ntab.act{opacity:1;color:#A8200E}
body.dk .ntab.act{color:#E04030}

/* Common */
.sec-hd{display:flex;align-items:center;gap:9px;margin:1.1rem 0 .6rem}
.sec-hd .sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.sec-hd .sln{flex:1;height:.5px;background:rgba(128,80,40,.15)}
body.dk .sec-hd .sln{background:rgba(255,255,255,.1)}
.sec-hd .sbd{font-size:11px;opacity:.5;background:rgba(128,80,40,.08);padding:1px 8px;border-radius:20px}
.ibtn{border:1.5px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:9px;transition:all .14s;flex-shrink:0;height:36px;padding:0 10px;font-size:12px;color:inherit;opacity:.55;font-weight:500;white-space:nowrap}
.ibtn:active{transform:scale(.9)}
.ibtn:hover{opacity:1;background:rgba(128,80,40,.08)}
.ibtn.due.on{opacity:1;color:#9A6C10}
.ibtn.urg.on{opacity:1;background:#A8200E;color:#F5E8C8;border-color:transparent}
.btn-add{opacity:1;background:#A8200E;color:#F5E8C8;border-color:transparent;font-weight:600}
.btn-add:hover{background:#C8321E}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:9px;border:1px solid rgba(128,80,40,.2);background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:inherit;opacity:.7;transition:all .14s}
.btn-sm:hover{opacity:1;background:rgba(128,80,40,.08)}
.btn-sm.primary{background:#A8200E;color:#F5E8C8;border-color:transparent;opacity:1}
.empty-state{text-align:center;padding:2.5rem 0;opacity:.5}
.empty-state .ei{font-size:36px;margin-bottom:8px}
.empty-state .et{font-size:13px}

/* XP / Level */
.xp-card{border-radius:14px;padding:14px 16px;margin-bottom:.9rem;position:relative;overflow:hidden}
.xp-card::before{content:'⚔️';position:absolute;right:12px;top:10px;font-size:40px;opacity:.12}
.xp-top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.xp-level{font-size:22px;font-weight:800;color:#A8200E}
body.dk .xp-level{color:#E04030}
.xp-title{font-size:13px;font-weight:600;opacity:.8}
.xp-bar-track{height:8px;border-radius:4px;background:rgba(128,80,40,.15);overflow:hidden;margin-bottom:4px}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#A8200E,#F08030);transition:width .6s ease}
.xp-info{display:flex;justify-content:space-between;font-size:11px;opacity:.5}

/* Daily Quests */
.quest-card{border-radius:14px;padding:13px 15px;margin-bottom:.9rem}
.quest-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.quest-hd-l{font-size:13px;font-weight:700}
.quest-streak{font-size:12px;color:#A8200E;font-weight:600}
body.dk .quest-streak{color:#E04030}
.quest-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid rgba(128,80,40,.08)}
.quest-item:last-child{border-bottom:none}
.quest-cb{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid rgba(128,80,40,.25);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.quest-cb.done{background:#2A5C38;border-color:#2A5C38;color:#fff}
body.dk .quest-cb.done{background:#48A060;border-color:#48A060}
.quest-txt{flex:1;font-size:13px}
.quest-prog{font-size:11px;opacity:.5;white-space:nowrap}
.quest-xp{font-size:11px;color:#A8200E;font-weight:600;white-space:nowrap}
body.dk .quest-xp{color:#E04030}

/* Input card */
.icard{border-radius:14px;padding:10px;margin-bottom:.8rem}
.ir1{display:flex;align-items:center;gap:5px}
.task-inp{flex:1;border:none;background:transparent;font-size:14px;color:inherit;outline:none;padding:7px 4px;min-width:0}
.task-inp::placeholder{opacity:.4}
.mic-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:inherit;opacity:.45;transition:all .15s;flex-shrink:0}
.mic-btn:hover{opacity:1;background:rgba(128,80,40,.08)}
.mic-btn.recording{opacity:1;color:#A8200E;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.cat-row{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid rgba(128,80,40,.1);overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
body.dk .cat-row{border-top-color:rgba(255,255,255,.08)}
.cpill{display:flex;align-items:center;gap:3px;padding:5px 10px;border-radius:20px;border:1.5px solid rgba(128,80,40,.15);background:transparent;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;color:inherit;opacity:.6;transition:all .15s;flex-shrink:0}
.cpill.sel{opacity:1;border-color:var(--cc);background:var(--cbg);color:var(--cc)}
.ir2{display:none;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(128,80,40,.1)}
body.dk .ir2{border-top-color:rgba(255,255,255,.08)}
.ir2.open{display:flex}
.ir2 label{font-size:12px;opacity:.5;flex-shrink:0}
.date-inp{border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.3);color:inherit;font-size:12px;padding:5px 9px;outline:none;flex:1}
body.dk .date-inp{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}

/* Routines */
.routine-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:.8rem}
.routine-row::-webkit-scrollbar{display:none}
.routine-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:1px solid rgba(128,80,40,.2);background:rgba(255,255,255,.5);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;color:inherit;flex-shrink:0;transition:all .15s}
body.dk .routine-btn{background:rgba(0,0,0,.3)}
.routine-btn:hover{background:rgba(255,255,255,.8);border-color:rgba(128,80,40,.35)}
.routine-btn:active{transform:scale(.93)}

/* Task cards */
#tl,.done-list{display:flex;flex-direction:column;gap:4px}
.tw{position:relative;border-radius:12px;overflow:hidden}
.del-bg{position:absolute;right:0;top:0;bottom:0;width:68px;background:#A8200E;display:flex;align-items:center;justify-content:center;color:#F5E8C8;font-size:18px;border-radius:0 12px 12px 0}
.task{position:relative;display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:12px;transition:transform .25s cubic-bezier(.25,.46,.45,.94),opacity .25s,max-height .28s;max-height:160px;overflow:hidden;animation:tIn .18s ease;touch-action:pan-y}
@keyframes tIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.task.urg-task{border-left:3px solid #A8200E}
.task.ov-task{border-left:3px solid #9A6C10}
.task.out{opacity:0;transform:translateX(45px);max-height:0;padding:0;margin:0;pointer-events:none}
.cb{width:22px;height:22px;min-width:22px;border-radius:50%;border:1.5px solid rgba(128,80,40,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;margin-top:1px;transition:all .15s}
body.dk .cb{border-color:rgba(255,255,255,.2)}
.cb:hover,.cb:active{border-color:#2A5C38;background:rgba(42,92,56,.15);color:#2A5C38}
.tbody{flex:1;min-width:0}
.ttxt{font-size:14px;line-height:1.45;word-break:break-word;outline:none;border-radius:4px}
.ttxt[contenteditable="true"]{background:rgba(128,80,40,.08);padding:2px 5px;margin:-2px -5px}
.tmeta{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.ch-urg{background:rgba(168,32,14,.12);color:#A8200E;border:1px solid rgba(168,32,14,.2)}
.ch-ov{background:rgba(154,108,16,.12);color:#9A6C10;border:1px solid rgba(154,108,16,.2)}
.ch-today{background:rgba(42,92,56,.12);color:#2A5C38;border:1px solid rgba(42,92,56,.2)}
.ch-soon{background:rgba(74,114,184,.12);color:#4A72B8;border:1px solid rgba(74,114,184,.2)}
.ch-due{background:rgba(128,80,40,.08);color:inherit;opacity:.65;border:1px solid rgba(128,80,40,.12)}
.cat-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid}
.tacts{display:flex;align-items:center;gap:1px;flex-shrink:0;transition:opacity .12s}
@media(hover:hover){.task:not(:hover) .tacts{opacity:0}}
@media(hover:none){.tacts{opacity:1}}
.tb{width:30px;height:30px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .12s;color:inherit;opacity:.45}
.tb:hover{opacity:1;background:rgba(128,80,40,.1)}
.tb.del:hover{background:rgba(168,32,14,.1);color:#A8200E;opacity:1}
.tb.urgb{font-weight:800;font-size:16px}
.tb.urgb.on{color:#A8200E;opacity:1}
.tb.focusbtn{font-size:14px}
.tb.focusbtn:hover{background:rgba(74,114,184,.1);color:#4A72B8;opacity:1}

/* Done section */
.done-hd{display:flex;align-items:center;gap:9px;margin:1.1rem 0 .6rem;cursor:pointer;user-select:none;opacity:.7}
.done-hd:hover{opacity:1}
.done-hd .sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.done-hd .sln{flex:1;height:.5px;background:rgba(128,80,40,.15)}
body.dk .done-hd .sln{background:rgba(255,255,255,.1)}
.done-hd .sbd{font-size:11px;opacity:.6;background:rgba(128,80,40,.08);padding:1px 8px;border-radius:20px}
.done-hd .dar{font-size:10px;opacity:.5;transition:transform .18s}
.done-hd.coll .dar{transform:rotate(-90deg)}
.dl-wrap.hid{display:none}
.di{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;opacity:.55;transition:opacity .15s;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:.55}}
.di:hover{opacity:.82}
.dck{width:18px;height:18px;min-width:18px;border-radius:50%;background:#2A5C38;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
body.dk .dck{background:#48A060}
.dtx{flex:1;font-size:13px;text-decoration:line-through;opacity:.7;word-break:break-word}
.ddt{font-size:11px;opacity:.45;flex-shrink:0;text-align:right;white-space:nowrap;line-height:1.4}
.ddl{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;color:inherit}
.di:hover .ddl{opacity:.5}
.ddl:hover{opacity:1!important;color:#A8200E}
.clr-done-btn{margin-top:.6rem;font-size:11px;opacity:.4;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;color:inherit;display:none}
.clr-done-btn:hover{color:#A8200E;opacity:.8}

/* Focus / Pomodoro */
.focus-overlay{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:rgba(0,0,0,.92);backdrop-filter:blur(20px)}
.focus-overlay.hidden{display:none}
.focus-mode-lbl{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.5;color:#F0E4CC;margin-bottom:.5rem}
.focus-task-name{font-size:18px;font-weight:700;color:#F0E4CC;text-align:center;margin-bottom:2rem;max-width:300px;line-height:1.4}
.focus-ring{position:relative;width:220px;height:220px;margin-bottom:2rem}
.focus-ring svg{transform:rotate(-90deg)}
.focus-ring .ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:10}
.focus-ring .ring-fill{fill:none;stroke:#A8200E;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.focus-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.focus-time-num{font-size:52px;font-weight:200;color:#F0E4CC;letter-spacing:-.02em;line-height:1}
.focus-time-lbl{font-size:12px;opacity:.5;color:#F0E4CC;margin-top:4px}
.focus-btns{display:flex;gap:12px}
.focus-btn{padding:12px 28px;border-radius:14px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s}
.focus-btn.start{background:#A8200E;color:#F5E8C8}
.focus-btn.start:hover{background:#C8321E}
.focus-btn.stop{background:rgba(255,255,255,.1);color:#F0E4CC}
.focus-btn.stop:hover{background:rgba(255,255,255,.2)}
.focus-sessions{margin-top:1.5rem;display:flex;gap:6px}
.focus-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2)}
.focus-dot.done{background:#A8200E}
.focus-select{border-radius:14px;padding:14px;margin-bottom:.9rem;text-align:center}
.focus-select-title{font-size:15px;font-weight:700;margin-bottom:.8rem}
.focus-task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:opacity .15s border-color .15s}
.focus-task-item:hover{opacity:.8}
.focus-task-item.sel{border:2px solid #A8200E}
body.dk .focus-task-item.sel{border-color:#E04030}

/* Search */
.search-bar{display:flex;align-items:center;gap:8px;border-radius:11px;padding:8px 12px;margin-bottom:.75rem}
.search-bar input{flex:1;border:none;background:transparent;font-size:14px;color:inherit;outline:none}
.search-bar input::placeholder{opacity:.4}
.search-bar .sico{opacity:.4;font-size:16px}
.ftabs{display:flex;gap:5px;margin-bottom:.75rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.5);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;color:inherit;opacity:.65;transition:all .15s;flex-shrink:0}
body.dk .ftab{background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.08)}
.ftab.act{opacity:1;background:rgba(255,255,255,.85);color:#1A0E06}
body.dk .ftab.act{background:rgba(255,255,255,.15);color:#F0E4CC}
.ftab .tct{font-size:10px;opacity:.55}

/* Heatmap */
.heatmap-wrap{border-radius:12px;padding:14px;margin-bottom:.9rem;overflow-x:auto}
.heatmap-grid{display:grid;grid-template-rows:repeat(7,12px);grid-auto-flow:column;gap:3px;width:max-content;margin:0 auto}
.hm-cell{width:12px;height:12px;border-radius:3px;background:rgba(128,80,40,.08)}
.hm-cell.l1{background:rgba(168,32,14,.2)}
.hm-cell.l2{background:rgba(168,32,14,.45)}
.hm-cell.l3{background:rgba(168,32,14,.7)}
.hm-cell.l4{background:#A8200E}
body.dk .hm-cell{background:rgba(255,255,255,.06)}
body.dk .hm-cell.l1{background:rgba(224,64,48,.2)}
body.dk .hm-cell.l2{background:rgba(224,64,48,.45)}
body.dk .hm-cell.l3{background:rgba(224,64,48,.7)}
body.dk .hm-cell.l4{background:#E04030}
.hm-months{display:flex;justify-content:space-between;font-size:10px;opacity:.4;margin-top:4px}

/* RPG Stats */
.rpg-card{border-radius:14px;padding:14px 16px;margin-bottom:.9rem}
.rpg-title{font-size:13px;font-weight:700;margin-bottom:10px;opacity:.8}
.rpg-stat{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.rpg-stat-lbl{font-size:12px;opacity:.7;width:56px;flex-shrink:0}
.rpg-bar-track{flex:1;height:8px;border-radius:4px;background:rgba(128,80,40,.1);overflow:hidden}

.rpg-stat-val{font-size:11px;opacity:.5;min-width:26px;text-align:right}

.stat-lbl{font-size:11px;opacity:.55;margin-top:3px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:12px;opacity:.7;width:60px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:8px;border-radius:4px;background:rgba(128,80,40,.1);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#A8200E;transition:width .5s ease}
body.dk .bar-fill{background:#E04030}
.bar-ct{font-size:11px;opacity:.5;min-width:20px}
.streak-badge{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;margin-bottom:.75rem}
.streak-num{font-size:32px;font-weight:700;color:#A8200E}
body.dk .streak-num{color:#E04030}
.streak-lbl{font-size:13px;opacity:.7}

/* Titles */
.titles-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}

.title-badge.locked{border-color:rgba(128,80,40,.15);opacity:.4}

/* Today */
.today-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:1rem 1rem .9rem;border-radius:14px;margin-bottom:.9rem}
.greet{font-size:20px;font-weight:700;letter-spacing:-.02em}
.today-date{font-size:12px;opacity:.55;margin-top:3px}
.today-meta{text-align:right}
.today-count{font-size:28px;font-weight:700;color:#A8200E;line-height:1}
body.dk .today-count{color:#E04030}
.today-count-lbl{font-size:10px;opacity:.5;margin-top:2px}
.brain-dump-btn{width:100%;padding:11px;border-radius:12px;border:2px dashed rgba(168,32,14,.35);background:rgba(168,32,14,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;color:#A8200E;transition:all .15s;margin-bottom:.9rem}
.brain-dump-btn:hover{background:rgba(168,32,14,.1)}
.brain-dump-btn:active{transform:scale(.97)}
body.dk .brain-dump-btn{color:#E04030;border-color:rgba(224,64,48,.35);background:rgba(224,64,48,.05)}
.inbox-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;animation:tIn .18s ease}
.inbox-txt{flex:1;font-size:14px;opacity:.85}
.inbox-cats{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.icat-btn{padding:3px 8px;border-radius:20px;border:1px solid rgba(128,80,40,.2);background:transparent;cursor:pointer;font-size:11px;color:inherit;opacity:.65;transition:all .14s}
.icat-btn:hover{opacity:1}
.quote-inline{border-radius:11px;padding:11px 14px;margin-bottom:.8rem;border-left:3px solid #A8200E;position:relative;overflow:hidden}
.qi-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:#A8200E;text-transform:uppercase;margin-bottom:4px}
.qi-en{font-size:12px;line-height:1.55;font-style:italic;opacity:.85}
.qi-ja{font-size:11px;opacity:.45;margin-top:3px}
.qi-au{font-size:10px;opacity:.35;margin-top:5px;text-align:right}

/* Diary */
.diary-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem}
.diary-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(128,80,40,.2);background:transparent;cursor:pointer;font-size:16px;color:inherit;opacity:.6;display:flex;align-items:center;justify-content:center}
.diary-nav-btn:hover{opacity:1}
.diary-date-lbl{font-size:15px;font-weight:600}
.mood-row{display:flex;gap:8px;margin-bottom:.8rem;justify-content:center}
.mood-btn{font-size:22px;width:44px;height:44px;border-radius:50%;border:2px solid transparent;background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}

.diary-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.8rem}
.diary-tag{padding:4px 10px;border-radius:20px;border:1px solid rgba(128,80,40,.2);font-size:12px;cursor:pointer;background:transparent;color:inherit;opacity:.6;transition:all .14s}
.diary-tag.sel{opacity:1;background:rgba(168,32,14,.1);border-color:rgba(168,32,14,.4);color:#A8200E}
.diary-meta-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding:0 2px}
.diary-time{font-size:11px;opacity:.4}
.diary-char-count{font-size:11px;opacity:.35}
.diary-area{width:100%;min-height:200px;border:1px solid rgba(128,80,40,.2);border-radius:12px;background:rgba(255,255,255,.3);color:inherit;font-size:14px;padding:13px;resize:none;outline:none;line-height:1.75;font-family:inherit;margin-bottom:.6rem}
body.dk .diary-area{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.diary-area::placeholder{opacity:.35}
.diary-confirm-btn{width:100%;padding:13px;border-radius:11px;border:none;background:#A8200E;color:#F5E8C8;font-size:14px;font-weight:600;cursor:pointer;margin-top:.5rem;transition:background .15s}
.diary-confirm-btn:hover{background:#C8321E}
.diary-confirm-btn:active{transform:scale(.98)}
.diary-confirmed{border-radius:12px;padding:14px 16px;margin-bottom:.8rem;border-left:3px solid #2A5C38}
body.dk .diary-confirmed{border-left-color:#48A060}
.dc-text{font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;opacity:.9}
.dc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.dc-time{font-size:11px;opacity:.4}
.dc-edit-btn{font-size:11px;opacity:.5;background:none;border:1px solid rgba(128,80,40,.2);border-radius:7px;padding:4px 10px;cursor:pointer;color:inherit;transition:all .14s}
.dc-edit-btn:hover{opacity:1;background:rgba(128,80,40,.08)}
.diary-entry-card{display:flex;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.diary-entry-card:hover{opacity:.85}
.dec-date{font-size:12px;font-weight:600;flex-shrink:0;opacity:.7;min-width:48px;line-height:1.5}
.dec-mood{font-size:16px;flex-shrink:0}
.dec-preview{font-size:12px;opacity:.6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}

/* Reading log */
.read-card{display:flex;gap:12px;padding:11px 13px;border-radius:11px;margin-bottom:5px;animation:tIn .18s ease}

.read-body{flex:1;min-width:0}
.read-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.read-author{font-size:11px;opacity:.5;margin-top:2px}
.read-meta{display:flex;gap:6px;margin-top:5px;align-items:center}
.read-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.rs-reading{background:rgba(74,114,184,.12);color:#4A72B8;border:1px solid rgba(74,114,184,.2)}
.rs-done{background:rgba(42,92,56,.12);color:#2A5C38;border:1px solid rgba(42,92,56,.2)}
.rs-tbr{background:rgba(128,80,40,.08);color:inherit;opacity:.65;border:1px solid rgba(128,80,40,.12)}
.read-stars{font-size:12px;opacity:.7}
.read-del{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;color:inherit;opacity:0;transition:opacity .12s;flex-shrink:0}
.read-card:hover .read-del{opacity:.4}
.read-del:hover{opacity:.8!important;color:#A8200E}

/* Add book form */
.add-book-form{border-radius:12px;padding:13px;margin-bottom:.9rem}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-inp{flex:1;border:1px solid rgba(128,80,40,.2);border-radius:8px;background:rgba(255,255,255,.3);color:inherit;font-size:13px;padding:8px 10px;outline:none}
body.dk .form-inp{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.form-inp:focus{border-color:rgba(128,80,40,.45)}
.form-sel{flex:1;border:1px solid rgba(128,80,40,.2);border-radius:8px;background:rgba(255,255,255,.3);color:inherit;font-size:13px;padding:8px 10px;outline:none;cursor:pointer}
body.dk .form-sel{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}

/* Settings */
.settings-section{margin-bottom:1.2rem}
.settings-section h3{font-size:12px;font-weight:700;letter-spacing:.08em;opacity:.5;text-transform:uppercase;margin-bottom:.6rem}
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px}
.sr-label{flex:1;font-size:14px}
.sr-sub{font-size:11px;opacity:.5;margin-top:2px}
.cat-edit-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:4px}
.cat-name-inp{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:inherit;outline:none;border-bottom:1px solid transparent;transition:border-color .15s}
.cat-name-inp:focus{border-bottom-color:rgba(128,80,40,.3)}
.export-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:.4rem}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px}
.user-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-avatar-pl{width:36px;height:36px;border-radius:50%;background:#A8200E;display:flex;align-items:center;justify-content:center;color:#F5E8C8;font-size:16px;flex-shrink:0}
.signout-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(168,32,14,.3);background:transparent;cursor:pointer;font-size:12px;color:#A8200E;opacity:.8}
.routine-edit-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;margin-bottom:4px}
.routine-name-inp{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:inherit;outline:none}
.routine-tasks-inp{font-size:12px;opacity:.6;flex:2;border:none;background:transparent;color:inherit;outline:none}
.routine-del-btn{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:inherit;opacity:.3;font-size:14px}
.routine-del-btn:hover{opacity:.8;color:#A8200E}

/* Brain dump modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{width:100%;max-width:600px;border-radius:18px 18px 0 0;padding:1.2rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:rgba(128,80,40,.1);cursor:pointer;font-size:16px;color:inherit;display:flex;align-items:center;justify-content:center}
.dump-area{width:100%;min-height:140px;border:1px solid rgba(128,80,40,.2);border-radius:11px;background:rgba(255,255,255,.3);color:inherit;font-size:14px;padding:12px;resize:vertical;outline:none;line-height:1.6;font-family:inherit}
body.dk .dump-area{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.dump-area::placeholder{opacity:.4}
.dump-hint{font-size:11px;opacity:.45;margin-top:5px;line-height:1.5}
.dump-result{display:none;margin-top:1rem}
.dump-result.show{display:block}
.dump-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;margin-bottom:5px}
.dump-item-txt{flex:1;font-size:13px}
.dump-cat-sel{border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.4);color:inherit;font-size:12px;padding:3px 7px;cursor:pointer;outline:none}
body.dk .dump-cat-sel{background:rgba(0,0,0,.25)}
.dump-urg{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:14px;opacity:.4;transition:all .14s}
.dump-urg.on{opacity:1}
.dump-rm{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;color:inherit;opacity:.35}
.dump-rm:hover{opacity:.8;color:#A8200E}

/* Undo */
#ub{position:fixed;bottom:calc(5rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:#1A0E06;color:#F0E4CC;font-size:13px;padding:10px 13px;border-radius:11px;display:flex;align-items:center;gap:11px;box-shadow:0 4px 20px rgba(0,0,0,.28);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;z-index:90;overflow:hidden;white-space:nowrap;max-width:calc(100vw - 2rem)}
body.dk #ub{background:#F0E4CC;color:#1A0E06}
#ub.show{transform:translateX(-50%) translateY(0);opacity:1}
#um{overflow:hidden;text-overflow:ellipsis}
#ubtn{background:none;border:1px solid rgba(255,255,255,.3);color:inherit;font-size:12px;padding:3px 9px;border-radius:6px;cursor:pointer;flex-shrink:0}
#up{position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.2);width:100%;transform-origin:left}

@media(max-width:420px){.stat-grid{grid-template-columns:1fr}.greet{font-size:18px}.focus-time-num{font-size:44px}}
</style>

'use strict';

/* ══ FIREBASE ══ */
const firebaseConfig={apiKey:"AIzaSyBbqBUuMfNIi34uzP1eYZYsJwQk91_35qY",authDomain:"to-do-list-8eda9.firebaseapp.com",projectId:"to-do-list-8eda9",storageBucket:"to-do-list-8eda9.firebasestorage.app",messagingSenderId:"972271815613",appId:"1:972271815613:web:75eafe09c6537d9bf460d4"};

const $e=(t,c='')=>{const e=document.createElement(t);if(c)e.className=c;return e};
const ge=id=>document.getElementById(id);
function todayKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function tomorrowKey(){const n=new Date();n.setDate(n.getDate()+1);return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function fmtKeyLong(k){const[y,m,d]=k.split('-');const days=['日','月','火','水','木','金','土'];const dt=new Date(k+'T00:00:00');return y+'年'+m+'月'+d+'日（'+days[dt.getDay()]+'）'}
function fmtKey(k){const[y,m,d]=k.split('-');return m+'/'+d}
function catById(id){return(S.cats||DEFAULT_CATS).find(c=>c.id===id)||(S.cats||DEFAULT_CATS)[1]}
function doyIdx(){const n=new Date();return Math.floor((n-new Date(n.getFullYear(),0,0))/86400000)}
function isToday(t){return t.due===todayKey()||t.urgent}
function isTomorrow(t){return t.due===tomorrowKey()}
function isOverdue(t){if(!t.due)return false;const today=new Date();today.setHours(0,0,0,0);return new Date(t.due+'T00:00:00')<today}
function dueInfo(d){
  if(!d)return null;
  const today=new Date();today.setHours(0,0,0,0);const due=new Date(d+'T00:00:00');const diff=Math.round((due-today)/86400000);
  if(diff<-1)return{label:Math.abs(diff)+'日超過',cls:'ch-ov',isOv:true};
  if(diff===-1)return{label:'昨日超過',cls:'ch-ov',isOv:true};
  if(diff===0)return{label:'今日',cls:'ch-today',isOv:false};
  if(diff===1)return{label:'明日',cls:'ch-soon',isOv:false};
  return{label:diff+'日後',cls:'ch-due',isOv:false};
}
function fmtTs(ts){const d=new Date(ts);const today=new Date();today.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);const diff=Math.round((today-dd)/86400000);const t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');if(diff===0)return'今日 '+t;if(diff===1)return'昨日 '+t;return(d.getMonth()+1)+'/'+(d.getDate())+' '+t;}

const XP_TASK=10,XP_URGENT=20,XP_DAILY=15,XP_DIARY=20,XP_BOOK=50;

  S.xp+=amount;

}

/* ══ DAILY QUESTS ══ */
function getQuests(){
  const today=todayKey();
  if(S.questsData&&S.questsData.date===today)return S.questsData;
  // Seeded pick 3
  const seed=parseInt(today.replace(/-/g,''));
  const shuffled=[...QUEST_POOL].sort((a,b)=>((seed*a.id.length)%7)-((seed*b.id.length)%7));
  const picked=shuffled.slice(0,3);
  S.questsData={date:today,quests:picked.map(q=>({...q,current:0,completed:false}))};
  return S.questsData;
}
async function saveQuests(){await metaRef().set({xp:S.xp,questsData:S.questsData},{merge:true});}
function updateQuestProgress(type,value=1){
  if(!S.questsData||S.questsData.date!==todayKey())return;
  let changed=false;
  S.questsData.quests.forEach(q=>{
    if(q.completed)return;
    const match=(type==='todo'&&q.cat==='todo')||(type==='idea'&&q.cat==='idea')||(type==='diary'&&q.cat==='diary')||(type==='daily'&&q.cat==='daily')||(type==='add'&&q.cat==='add')||(type==='urg'&&q.cat==='urg');
    if(!match)return;
    q.current=Math.min(q.target,(q.current||0)+value);
    if(q.current>=q.target&&!q.completed){q.completed=true;awardXP(q.xp,'クエスト完了');changed=true;}
    else if(q.current<q.target)changed=true;
  });
  if(changed){saveQuests();if(S.ui.tab==='today')renderToday();}
}
function getStreak(){
  const today=new Date();today.setHours(0,0,0,0);let streak=0;
  for(let i=0;i<90;i++){const d=new Date(today);d.setDate(d.getDate()-i);const has=S.done.some(t=>{const td=new Date(t.completedAt);td.setHours(0,0,0,0);return td.getTime()===d.getTime();});if(has)streak++;else if(i>0)break;}
  return streak;
}

function buildTaskCard(task,opts={}){
  const cat=catById(task.cat);const chip=dueInfo(task.due);

  const item=$e('div','task g');

  if(!opts.noFocus){const fb=$e('button','tb focusbtn');fb.textContent='🎯';fb.title='フォーカス';fb.addEventListener('click',()=>startFocusOn(task.id));}
  const db2=$e('button','tb del');db2.textContent='✕';db2.addEventListener('click',()=>{item.classList.add('out');setTimeout(()=>fsDel(task.id),270);});
  acts.appendChild(ub2);if(!opts.noFocus){const fb=$e('button','tb focusbtn');fb.textContent='🎯';fb.title='フォーカス';fb.addEventListener('click',()=>startFocusOn(task.id));acts.appendChild(fb);}acts.appendChild(db2);

function buildInputCard(){
  const icard=$e('div','icard g');const ir1=$e('div','ir1');

  const duebtn=$e('button','ibtn due'+(S.ui.showDue?' on':''));duebtn.textContent='📅';
  const flbtn=$e('button','ibtn urg'+(S.ui.flagged?' on':''));flbtn.innerHTML='🔥';
  const addbtn=$e('button','ibtn btn-add');addbtn.textContent='追加';
  ir1.appendChild(inp);ir1.appendChild(micBtn);ir1.appendChild(duebtn);ir1.appendChild(flbtn);ir1.appendChild(addbtn);icard.appendChild(ir1);

  // Voice input
  let recognizing=false;
  micBtn.addEventListener('click',()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('このブラウザは音声入力に対応していません');return;}
    if(recognizing){return;}
    const rec=new SR();rec.lang='ja-JP';rec.interimResults=false;rec.maxAlternatives=1;
    rec.onstart=()=>{recognizing=true;micBtn.classList.add('recording');};
    rec.onresult=e=>{inp.value=e.results[0][0].transcript;inp.focus();};
    rec.onend=()=>{recognizing=false;micBtn.classList.remove('recording');};
    rec.onerror=()=>{recognizing=false;micBtn.classList.remove('recording');};
    rec.start();
  });

  const catrow=$e('div','cat-row');
  (S.cats||DEFAULT_CATS).forEach(c=>{const b=$e('button','cpill'+(S.ui.curCat===c.id?' sel':''));b.style.setProperty('--cc',c.color);b.style.setProperty('--cbg',c.bg);b.innerHTML=`<span>${c.icon}</span><span>${c.label}</span>`;b.addEventListener('click',()=>{S.ui.curCat=c.id;render();});catrow.appendChild(b);});icard.appendChild(catrow);

  const ir2=$e('div','ir2'+(S.ui.showDue?' open':''));const dl2=$e('label','');dl2.textContent='期日';
  const di=$e('input','date-inp');di.type='date';const clr=$e('button','ibtn');clr.textContent='✕';clr.addEventListener('click',()=>di.value='');
  ir2.appendChild(dl2);ir2.appendChild(di);ir2.appendChild(clr);icard.appendChild(ir2);

  function doAdd(){
    const text=inp.value.trim();if(!text)return;
    const task={id:Date.now(),text,cat:S.ui.curCat,urgent:S.ui.flagged,due:di.value||null,created:Date.now()};
    inp.value='';di.value='';S.ui.flagged=false;S.ui.showDue=false;
    fsAdd(task);updateQuestProgress('add');render();inp.focus();
  }
  addbtn.addEventListener('click',doAdd);inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
  duebtn.addEventListener('click',()=>{S.ui.showDue=!S.ui.showDue;ir2.classList.toggle('open',S.ui.showDue);duebtn.classList.toggle('on',S.ui.showDue);if(S.ui.showDue)di.focus();});
  flbtn.addEventListener('click',()=>{S.ui.flagged=!S.ui.flagged;flbtn.classList.toggle('on',S.ui.flagged);});
  return icard;
}

/* ══ TASK OPS ══ */
function completeTask(task){
  const t={...task,completedAt:Date.now()};
  fsComplete(t);
  const xp=xpForTask(task);awardXP(xp,'タスク完了');
  showUndo(t);
  updateQuestProgress(task.urgent?'urg':task.cat,1);
}
function startEdit(el,task){
  el.contentEditable='true';el.focus();
  const r=document.createRange();r.selectNodeContents(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}if(e.key==='Escape'){el.textContent=task.text;el.blur();}});
  el.addEventListener('blur',()=>{task.text=el.textContent.trim()||task.text;el.textContent=task.text;el.contentEditable='false';fsUpdate(task);},{once:true});
}

/* ══ EXPORT/IMPORT ══ */
function exportData(){const data={tasks:S.tasks,done:S.done,diary:S.diary,reading:S.reading,xp:S.xp,exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='todo_'+todayKey()+'.json';a.click();URL.revokeObjectURL(url);}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.addEventListener('change',()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{try{const d=JSON.parse(e.target.result);if(d.tasks){const b=db.batch();d.tasks.forEach(t=>b.set(tasksRef().doc(String(t.id)),t));await b.commit();}if(d.done){const b=db.batch();d.done.forEach(t=>b.set(doneRef().doc(String(t.id)),t));await b.commit();}if(d.diary){for(const[k,val] of Object.entries(d.diary))await fsSaveDiary(k,val);}alert('インポート完了！');}catch(err){alert('エラー');}};r.readAsText(f);});inp.click();}

/* ══ SWIPE ══ */
function addSwipe(el,onDelete){
  let sx,sy,drag=false,moved=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=false;moved=false;el.style.transition='none';},{passive:true});
  el.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(!moved){if(Math.abs(dx)>Math.abs(dy)&&dx<-10){drag=true;moved=true;}else if(Math.abs(dy)>10)moved=true;}if(drag){e.preventDefault();el.style.transform='translateX('+Math.max(Math.min(dx,0),-90)+'px)';}},{passive:false});
  el.addEventListener('touchend',e=>{if(!drag)return;drag=false;const dx=e.changedTouches[0].clientX-sx;el.style.transition='';if(dx<-65){el.style.transition='transform .22s,opacity .22s';el.style.transform='translateX(-110px)';el.style.opacity='0';setTimeout(onDelete,230);}else el.style.transform='';});
}

/* ══ BRAIN DUMP ══ */
function categorize(text){const t=text.toLowerCase();if(/ジム|gym|筋トレ|運動|walk|散歩|食事|飯|風呂|sleep|寝|掃除|洗濯/.test(t))return'daily';if(/アイデア|idea|案|ビジネス|business|startup|サービス|プロダクト/.test(t))return'idea';if(/行く|go to|visit|カフェ|cafe|レストラン|場所|place|スポット/.test(t))return'place';if(/メモ|note|覚え|情報|資料|調べ/.test(t))return'memo';return'todo';}
function openBrainDump(){ge('bd-overlay').classList.add('open');ge('dump-area').focus();ge('dump-add-all').style.display='none';ge('dump-result').className='dump-result';ge('dump-result').innerHTML='';dumpItems=[];}
function closeBrainDump(){ge('bd-overlay').classList.remove('open');}
ge('bd-close').addEventListener('click',closeBrainDump);
ge('bd-overlay').addEventListener('click',e=>{if(e.target===ge('bd-overlay'))closeBrainDump();});
ge('dump-organize').addEventListener('click',()=>{
  const raw=ge('dump-area').value.trim();if(!raw)return;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  dumpItems=lines.map((text,i)=>({id:i,text,cat:categorize(text),urgent:false}));
  const res=ge('dump-result');res.className='dump-result show';res.innerHTML='';
  dumpItems.forEach(item=>{const row=$e('div','dump-item g');const tx=$e('div','dump-item-txt');tx.textContent=item.text;const sel=$e('select','dump-cat-sel');S.cats.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.icon+' '+c.label;if(c.id===item.cat)o.selected=true;sel.appendChild(o);});sel.addEventListener('change',()=>item.cat=sel.value);const urg=$e('button','dump-urg');urg.textContent='🔥';urg.addEventListener('click',()=>{item.urgent=!item.urgent;urg.classList.toggle('on',item.urgent);});const rm=$e('button','dump-rm');rm.textContent='✕';rm.addEventListener('click',()=>{dumpItems=dumpItems.filter(d=>d.id!==item.id);row.remove();if(!dumpItems.length)ge('dump-add-all').style.display='none';});row.appendChild(tx);row.appendChild(sel);row.appendChild(urg);row.appendChild(rm);res.appendChild(row);});
  ge('dump-add-all').style.display=dumpItems.length?'flex':'none';
});
ge('dump-add-all').addEventListener('click',()=>{
  dumpItems.forEach(item=>{if(item.text)fsAdd({id:Date.now()+Math.random(),text:item.text,cat:item.cat,urgent:item.urgent,due:null,created:Date.now()});});
  closeBrainDump();ge('dump-area').value='';dumpItems=[];
});

/* ══ UNDO ══ */
function showUndo(task){clearTimeout(undoTimer);undoTask=task;ge('um').textContent='「'+task.text.slice(0,14)+(task.text.length>14?'…':'')+'」を完了';const ub=ge('ub');ub.classList.add('show');const up=ge('up');up.style.transition='none';up.style.transform='scaleX(1)';requestAnimationFrame(()=>requestAnimationFrame(()=>{up.style.transition='transform 15s linear';up.style.transform='scaleX(0)';}));undoTimer=setTimeout(()=>{ub.classList.remove('show');undoTask=null;},15000);}
ge('ubtn').addEventListener('click',()=>{if(!undoTask)return;clearTimeout(undoTimer);fsUndo(undoTask);undoTask=null;ge('ub').classList.remove('show');});

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();const inp=document.querySelector('.task-inp');if(inp)inp.focus();}if((e.metaKey||e.ctrlKey)&&e.key==='b'){e.preventDefault();openBrainDump();}});

/* ══ INIT ══ */
function initApp(){
  loadLocal();initScene();initNav();setSyncing();startListeners();render();
}
</script>
