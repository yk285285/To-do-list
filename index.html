<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Todo">
<title>Todo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23A8200E'/><path d='M7 17l5 5L25 10' stroke='%23F5E8C8' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%23A8200E'/><path d='M38 96l30 30L142 54' stroke='%23F5E8C8' stroke-width='16' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif;background:#1A0E06;color:#1A0E06;display:flex;flex-direction:column}
body.dk{color:#F0E4CC}
input,textarea,button,select{font-family:inherit}

/* ── Login screen ── */
#login-screen{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);backdrop-filter:blur(20px);
}
#login-screen.hidden{display:none}
.login-card{
  background:rgba(255,255,255,.95);border-radius:20px;
  padding:2.5rem 2rem;text-align:center;max-width:320px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
body.dk .login-card{background:rgba(20,12,4,.95);border:1px solid rgba(255,255,255,.1)}
.login-seal{
  width:56px;height:56px;background:#A8200E;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:#F5E8C8;font-size:28px;font-weight:700;margin:0 auto 1.2rem;
  box-shadow:3px 3px 0 rgba(0,0,0,.2);
}
.login-title{font-size:22px;font-weight:700;margin-bottom:.4rem;color:#1A0E06}
body.dk .login-title{color:#F0E4CC}
.login-sub{font-size:13px;opacity:.5;margin-bottom:1.8rem;line-height:1.5}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:12px;border-radius:12px;
  border:1.5px solid rgba(0,0,0,.12);background:white;
  cursor:pointer;font-size:14px;font-weight:600;color:#1A0E06;
  transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.google-btn:hover{background:#f8f8f8;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.google-btn:active{transform:scale(.97)}
.google-logo{width:20px;height:20px}
.login-note{font-size:11px;opacity:.4;margin-top:1rem;line-height:1.5}

/* ── Sync bar ── */
#sync-bar{position:fixed;top:0;left:0;right:0;z-index:200;height:2px;background:transparent;transition:background .3s}
#sync-bar.syncing{background:linear-gradient(90deg,#A8200E,#F08030,#A8200E);background-size:200%;animation:syncAnim 1.2s infinite}
#sync-bar.ok{background:#2A5C38}
@keyframes syncAnim{0%{background-position:0%}100%{background-position:200%}}

#bg{position:fixed;inset:0;z-index:0}
#bg svg{width:100%;height:100%;display:block}

.g{background:rgba(255,255,255,.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.65);box-shadow:0 2px 16px rgba(0,0,0,.08)}
body.dk .g{background:rgba(8,4,2,.68);border-color:rgba(255,255,255,.10)}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;width:100%}
#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding:0 .85rem;padding-bottom:calc(5rem + env(safe-area-inset-bottom));padding-top:.6rem;display:none}
.view.active{display:block}
.view::-webkit-scrollbar{display:none}

#qpill{display:none}
.quote-inline{border-radius:11px;padding:11px 14px;margin-bottom:.8rem;border-left:3px solid #A8200E;position:relative;overflow:hidden;cursor:pointer;transition:opacity .15s}
.quote-inline:active{opacity:.8}
.qi-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:#A8200E;text-transform:uppercase;margin-bottom:4px}
.qi-en{font-size:12px;line-height:1.55;font-style:italic;opacity:.85}
.qi-ja{font-size:11px;opacity:.45;margin-top:3px}
.qi-au{font-size:10px;opacity:.35;margin-top:5px;text-align:right}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ql{font-size:10px;font-weight:700;letter-spacing:.1em;color:#A8200E;text-transform:uppercase;margin-bottom:5px}
.qt{font-size:12px;line-height:1.6;font-style:italic;opacity:.9}
.qj{font-size:11px;opacity:.5;margin-top:3px;line-height:1.5}
.qa{font-size:10px;opacity:.4;margin-top:5px;text-align:right}

.bnav{position:relative;z-index:10;flex-shrink:0;display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom);border-top:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
body.dk .bnav{border-top-color:rgba(255,255,255,.1);background:rgba(8,4,2,.78)}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:7px 4px 8px;cursor:pointer;border:none;background:transparent;color:inherit;opacity:.4;transition:opacity .15s;font-size:10px;font-weight:500}
.ntab .ni{font-size:20px;line-height:1}
.ntab.act{opacity:1;color:#A8200E}
body.dk .ntab.act{color:#E04030}

.sec-hd{display:flex;align-items:center;gap:9px;margin:1.1rem 0 .6rem}
.sec-hd .sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.sec-hd .sln{flex:1;height:.5px;background:rgba(128,80,40,.15)}
body.dk .sec-hd .sln{background:rgba(255,255,255,.1)}
.sec-hd .sbd{font-size:11px;opacity:.5;background:rgba(128,80,40,.08);padding:1px 8px;border-radius:20px}

.icard{border-radius:14px;padding:10px;margin-bottom:.8rem}
.ir1{display:flex;align-items:center;gap:6px}
.task-inp{flex:1;border:none;background:transparent;font-size:14px;color:inherit;outline:none;padding:6px 4px;min-width:0}
.task-inp::placeholder{opacity:.4}
.cat-row{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid rgba(128,80,40,.1);overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
body.dk .cat-row{border-top-color:rgba(255,255,255,.08)}
.cpill{display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;border:1.5px solid rgba(128,80,40,.15);background:transparent;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;color:inherit;opacity:.6;transition:all .15s;flex-shrink:0}
.cpill.sel{opacity:1;border-color:var(--cc);background:var(--cbg);color:var(--cc)}
.ir2{display:none;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(128,80,40,.1)}
body.dk .ir2{border-top-color:rgba(255,255,255,.08)}
.ir2.open{display:flex}
.ir2 label{font-size:12px;opacity:.5;flex-shrink:0}
.date-inp{border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.3);color:inherit;font-size:12px;padding:5px 9px;outline:none;flex:1}
body.dk .date-inp{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}

.ibtn{border:1.5px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .14s;flex-shrink:0;height:34px;padding:0 10px;font-size:12px;color:inherit;opacity:.55;font-weight:500;white-space:nowrap}
.ibtn:active{transform:scale(.9)}
.ibtn:hover{opacity:1;background:rgba(128,80,40,.08)}
.ibtn.due.on{opacity:1;color:#9A6C10}
.ibtn.urg.on{opacity:1;background:#A8200E;color:#F5E8C8;border-color:transparent}
.btn-add{opacity:1;background:#A8200E;color:#F5E8C8;border-color:transparent;font-weight:600}
.btn-add:hover{background:#C8321E}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:9px;border:1px solid rgba(128,80,40,.2);background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:inherit;opacity:.7;transition:all .14s}
.btn-sm:hover{opacity:1;background:rgba(128,80,40,.08)}
.btn-primary{background:#A8200E;color:#F5E8C8;border-color:transparent;opacity:1}
.btn-primary:hover{background:#C8321E}

.search-bar{display:flex;align-items:center;gap:8px;border-radius:11px;padding:8px 12px;margin-bottom:.75rem}
.search-bar input{flex:1;border:none;background:transparent;font-size:14px;color:inherit;outline:none}
.search-bar input::placeholder{opacity:.4}
.search-bar .sico{opacity:.4;font-size:16px}

.ftabs{display:flex;gap:5px;margin-bottom:.75rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.5);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;color:inherit;opacity:.65;transition:all .15s;flex-shrink:0}
body.dk .ftab{background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.08)}
.ftab.act{opacity:1;background:rgba(255,255,255,.85);color:#1A0E06}
body.dk .ftab.act{background:rgba(255,255,255,.15);color:#F0E4CC}
.ftab .tct{font-size:10px;opacity:.55}

#tl,.done-list{display:flex;flex-direction:column;gap:4px}
.tw{position:relative;border-radius:12px;overflow:hidden}
.del-bg{position:absolute;right:0;top:0;bottom:0;width:68px;background:#A8200E;display:flex;align-items:center;justify-content:center;color:#F5E8C8;font-size:18px;border-radius:0 12px 12px 0}
.task{position:relative;display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:12px;transition:transform .25s cubic-bezier(.25,.46,.45,.94),opacity .25s,max-height .28s;max-height:150px;overflow:hidden;animation:tIn .18s ease;touch-action:pan-y}
@keyframes tIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.task.urg-task{border-left:3px solid #A8200E}
.task.ov-task{border-left:3px solid #9A6C10}
.task.out{opacity:0;transform:translateX(45px);max-height:0;padding:0;margin:0;pointer-events:none}

.cb{width:20px;height:20px;min-width:20px;border-radius:50%;border:1.5px solid rgba(128,80,40,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;margin-top:2px;transition:all .15s}
body.dk .cb{border-color:rgba(255,255,255,.2)}
.cb:hover,.cb:active{border-color:#2A5C38;background:rgba(42,92,56,.15);color:#2A5C38}

.tbody{flex:1;min-width:0}
.ttxt{font-size:14px;line-height:1.45;word-break:break-word;outline:none;border-radius:4px}
.ttxt[contenteditable="true"]{background:rgba(128,80,40,.08);padding:2px 5px;margin:-2px -5px}
.tmeta{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.ch-urg{background:rgba(168,32,14,.12);color:#A8200E;border:1px solid rgba(168,32,14,.2)}
.ch-ov{background:rgba(154,108,16,.12);color:#9A6C10;border:1px solid rgba(154,108,16,.2)}
.ch-today{background:rgba(42,92,56,.12);color:#2A5C38;border:1px solid rgba(42,92,56,.2)}
.ch-soon{background:rgba(74,114,184,.12);color:#4A72B8;border:1px solid rgba(74,114,184,.2)}
.ch-due{background:rgba(128,80,40,.08);color:inherit;opacity:.65;border:1px solid rgba(128,80,40,.12)}
.cat-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid}

.tacts{display:flex;align-items:center;gap:1px;flex-shrink:0;transition:opacity .12s}
@media(hover:hover){.task:not(:hover) .tacts{opacity:0}}
@media(hover:none){.tacts{opacity:1}}
.tb{width:28px;height:28px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .12s;color:inherit;opacity:.45}
.tb:hover{opacity:1;background:rgba(128,80,40,.1)}
.tb.del:hover{background:rgba(168,32,14,.1);color:#A8200E;opacity:1}
.tb.urgb{font-weight:800;font-size:15px}
.tb.urgb.on{color:#A8200E;opacity:1}

.empty-state{text-align:center;padding:2.5rem 0;opacity:.5}
.empty-state .ei{font-size:36px;margin-bottom:8px}
.empty-state .et{font-size:13px}

.done-hd{display:flex;align-items:center;gap:9px;margin:1.1rem 0 .6rem;cursor:pointer;user-select:none;opacity:.7}
.done-hd:hover{opacity:1}
.done-hd .sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.done-hd .sln{flex:1;height:.5px;background:rgba(128,80,40,.15)}
body.dk .done-hd .sln{background:rgba(255,255,255,.1)}
.done-hd .sbd{font-size:11px;opacity:.6;background:rgba(128,80,40,.08);padding:1px 8px;border-radius:20px}
.done-hd .dar{font-size:10px;opacity:.5;transition:transform .18s}
.done-hd.coll .dar{transform:rotate(-90deg)}
.dl-wrap.hid{display:none}

.di{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;opacity:.55;transition:opacity .15s;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:.55}}
.di:hover{opacity:.82}
.dck{width:18px;height:18px;min-width:18px;border-radius:50%;background:#2A5C38;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
body.dk .dck{background:#48A060}
.dtx{flex:1;font-size:13px;text-decoration:line-through;opacity:.7;word-break:break-word}
.ddt{font-size:11px;opacity:.45;flex-shrink:0;text-align:right;white-space:nowrap;line-height:1.4}
.ddl{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;color:inherit}
.di:hover .ddl{opacity:.5}
.ddl:hover{opacity:1!important;color:#A8200E}
.clr-done-btn{margin-top:.6rem;font-size:11px;opacity:.4;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;color:inherit;display:none}
.clr-done-btn:hover{color:#A8200E;opacity:.8}

.today-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:1rem 1rem .9rem;border-radius:14px;margin-bottom:.9rem}
.greet{font-size:20px;font-weight:700;letter-spacing:-.02em}
.today-date{font-size:12px;opacity:.55;margin-top:3px}
.today-meta{text-align:right}
.today-count{font-size:28px;font-weight:700;color:#A8200E;line-height:1}
body.dk .today-count{color:#E04030}
.today-count-lbl{font-size:10px;opacity:.5;margin-top:2px}
.brain-dump-btn{width:100%;padding:11px;border-radius:12px;border:2px dashed rgba(168,32,14,.35);background:rgba(168,32,14,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;color:#A8200E;transition:all .15s;margin-bottom:.9rem}
.brain-dump-btn:hover{background:rgba(168,32,14,.1)}
.brain-dump-btn:active{transform:scale(.97)}
body.dk .brain-dump-btn{color:#E04030;border-color:rgba(224,64,48,.35);background:rgba(224,64,48,.05)}

.inbox-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;animation:tIn .18s ease}
.inbox-txt{flex:1;font-size:14px;opacity:.85}
.inbox-cats{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.icat-btn{padding:3px 8px;border-radius:20px;border:1px solid rgba(128,80,40,.2);background:transparent;cursor:pointer;font-size:11px;color:inherit;opacity:.65;transition:all .14s}
.icat-btn:hover{opacity:1}

.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{width:100%;max-width:600px;border-radius:18px 18px 0 0;padding:1.2rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:rgba(128,80,40,.1);cursor:pointer;font-size:16px;color:inherit;display:flex;align-items:center;justify-content:center}
.dump-area{width:100%;min-height:140px;border:1px solid rgba(128,80,40,.2);border-radius:11px;background:rgba(255,255,255,.3);color:inherit;font-size:14px;padding:12px;resize:vertical;outline:none;line-height:1.6;font-family:inherit}
body.dk .dump-area{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.dump-area::placeholder{opacity:.4}
.dump-hint{font-size:11px;opacity:.45;margin-top:5px;line-height:1.5}
.dump-result{display:none;margin-top:1rem}
.dump-result.show{display:block}
.dump-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;margin-bottom:5px}
.dump-item-txt{flex:1;font-size:13px}
.dump-cat-sel{border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.4);color:inherit;font-size:12px;padding:3px 7px;cursor:pointer;outline:none}
body.dk .dump-cat-sel{background:rgba(0,0,0,.25)}
.dump-urg{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:14px;opacity:.4;transition:all .14s}
.dump-urg.on{opacity:1}
.dump-rm{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;color:inherit;opacity:.35}
.dump-rm:hover{opacity:.8;color:#A8200E}

.diary-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem}
.diary-nav-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(128,80,40,.2);background:transparent;cursor:pointer;font-size:16px;color:inherit;opacity:.6;display:flex;align-items:center;justify-content:center}
.diary-nav-btn:hover{opacity:1}
.diary-date-lbl{font-size:15px;font-weight:600}
.mood-row{display:flex;gap:8px;margin-bottom:.8rem;justify-content:center}
.mood-btn{font-size:22px;width:40px;height:40px;border-radius:50%;border:2px solid transparent;background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.mood-btn:active{transform:scale(.85)}
.mood-btn.sel{border-color:rgba(168,32,14,.6);background:rgba(168,32,14,.08);transform:scale(1.15)}
.diary-area{width:100%;min-height:180px;border:1px solid rgba(128,80,40,.2);border-radius:12px;background:rgba(255,255,255,.3);color:inherit;font-size:14px;padding:12px;resize:none;outline:none;line-height:1.7;font-family:inherit;margin-bottom:.8rem}
body.dk .diary-area{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.diary-area::placeholder{opacity:.35}
.diary-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.8rem}
.diary-tag{padding:3px 10px;border-radius:20px;border:1px solid rgba(128,80,40,.2);font-size:12px;cursor:pointer;background:transparent;color:inherit;opacity:.6;transition:all .14s}
.diary-tag.sel{opacity:1;background:rgba(168,32,14,.1);border-color:rgba(168,32,14,.4);color:#A8200E}
.diary-entry-card{display:flex;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.diary-entry-card:hover{opacity:.85}
.dec-date{font-size:12px;font-weight:600;flex-shrink:0;opacity:.7;min-width:48px;line-height:1.5}
.dec-mood{font-size:16px;flex-shrink:0}
.dec-preview{font-size:12px;opacity:.6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.75rem}
.stat-card{border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#A8200E;line-height:1.1}
body.dk .stat-num{color:#E04030}
.stat-lbl{font-size:11px;opacity:.55;margin-top:3px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:12px;opacity:.7;width:60px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:8px;border-radius:4px;background:rgba(128,80,40,.1);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#A8200E;transition:width .5s ease}
.bar-ct{font-size:11px;opacity:.5;min-width:20px}
.streak-badge{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;margin-bottom:.75rem}
.streak-num{font-size:32px;font-weight:700;color:#A8200E}
body.dk .streak-num{color:#E04030}
.streak-lbl{font-size:13px;opacity:.7}

.settings-section{margin-bottom:1.2rem}
.settings-section h3{font-size:12px;font-weight:700;letter-spacing:.08em;opacity:.5;text-transform:uppercase;margin-bottom:.6rem}
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px}
.sr-label{flex:1;font-size:14px}
.sr-sub{font-size:11px;opacity:.5;margin-top:2px}
.cat-edit-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:4px}
.cat-name-inp{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:inherit;outline:none;border-bottom:1px solid transparent;transition:border-color .15s}
.cat-name-inp:focus{border-bottom-color:rgba(128,80,40,.3)}
.export-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:.4rem}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px}
.user-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:#A8200E;display:flex;align-items:center;justify-content:center;color:#F5E8C8;font-size:16px;flex-shrink:0}
.signout-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(168,32,14,.3);background:transparent;cursor:pointer;font-size:12px;color:#A8200E;opacity:.8}
.signout-btn:hover{opacity:1;background:rgba(168,32,14,.08)}

#ub{position:fixed;bottom:calc(4.5rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:#1A0E06;color:#F0E4CC;font-size:13px;padding:10px 13px;border-radius:11px;display:flex;align-items:center;gap:11px;box-shadow:0 4px 20px rgba(0,0,0,.28);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;z-index:90;overflow:hidden;white-space:nowrap;max-width:calc(100vw - 2rem)}
body.dk #ub{background:#F0E4CC;color:#1A0E06}
#ub.show{transform:translateX(-50%) translateY(0);opacity:1}
#um{overflow:hidden;text-overflow:ellipsis}
#ubtn{background:none;border:1px solid rgba(255,255,255,.3);color:inherit;font-size:12px;padding:3px 9px;border-radius:6px;cursor:pointer;flex-shrink:0}
#up{position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.2);width:100%;transform-origin:left}

/* ══ STATE ══ */
let S = {
  tasks:[], done:[], diary:{}, cats:null,
  ui:{ tab:'today', filterDate:'all', filterCat:'all', search:'', doneColl:false, curCat:'todo', flagged:false, showDue:false, diaryDate:todayKey(), inboxColl:false }
};
let undoTimer=null, undoTask=null, dumpItems=[];

/* ══ HELPERS ══ */
const $e=(tag,cls='')=>{const e=document.createElement(tag);if(cls)e.className=cls;return e};
const ge=id=>document.getElementById(id);
function todayKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function tomorrowKey(){const n=new Date();n.setDate(n.getDate()+1);return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function fmtKeyLong(k){const[y,m,d]=k.split('-');const days=['日','月','火','水','木','金','土'];const dt=new Date(k+'T00:00:00');return y+'年'+m+'月'+d+'日（'+days[dt.getDay()]+'）'}
function fmtKey(k){const[y,m,d]=k.split('-');return m+'/'+d}
function catById(id){return(S.cats||DEFAULT_CATS).find(c=>c.id===id)||(S.cats||DEFAULT_CATS)[1]}
function doyIdx(){const n=new Date();return Math.floor((n-new Date(n.getFullYear(),0,0))/86400000)}
function isToday(t){return t.due===todayKey()||t.urgent}
function isTomorrow(t){return t.due===tomorrowKey()}
function isOverdue(t){if(!t.due)return false;const today=new Date();today.setHours(0,0,0,0);return new Date(t.due+'T00:00:00')<today}
function dueInfo(d){
  if(!d)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(d+'T00:00:00');
  const diff=Math.round((due-today)/86400000);
  if(diff<-1)return{label:Math.abs(diff)+'日超過',cls:'ch-ov',isOv:true};
  if(diff===-1)return{label:'昨日超過',cls:'ch-ov',isOv:true};
  if(diff===0)return{label:'今日',cls:'ch-today',isOv:false};
  if(diff===1)return{label:'明日',cls:'ch-soon',isOv:false};
  return{label:diff+'日後',cls:'ch-due',isOv:false};
}
function fmtTs(ts){
  const d=new Date(ts);
  const today=new Date();today.setHours(0,0,0,0);
  const dd=new Date(d);dd.setHours(0,0,0,0);
  const diff=Math.round((today-dd)/86400000);
  const t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  if(diff===0)return'今日 '+t;if(diff===1)return'昨日 '+t;
  return(d.getMonth()+1)+'/'+(d.getDate())+' '+t;
}
function saveLocal(){try{localStorage.setItem('td_cats',JSON.stringify(S.cats));localStorage.setItem('td_ui',JSON.stringify({doneColl:S.ui.doneColl,inboxColl:S.ui.inboxColl}));}catch(e){}}
function loadLocal(){try{const c=localStorage.getItem('td_cats');if(c)S.cats=JSON.parse(c);const uv=localStorage.getItem('td_ui');if(uv){const u=JSON.parse(uv);S.ui.doneColl=u.doneColl||false;S.ui.inboxColl=u.inboxColl||false;}}catch(e){}if(!S.cats)S.cats=DEFAULT_CATS.map(c=>({...c}));}

/* ══ FIRESTORE ══ */
async function fsAdd(task){setSyncing();try{await tasksRef().doc(String(task.id)).set(task);setSyncOk();}catch(e){}}
async function fsUpdate(task){setSyncing();try{await tasksRef().doc(String(task.id)).set(task);setSyncOk();}catch(e){}}
async function fsDel(id){setSyncing();try{await tasksRef().doc(String(id)).delete();setSyncOk();}catch(e){}}
async function fsComplete(task){
  setSyncing();
  try{const b=db.batch();b.delete(tasksRef().doc(String(task.id)));b.set(doneRef().doc(String(task.id)),task);await b.commit();setSyncOk();}catch(e){}
}
async function fsDelDone(id){try{await doneRef().doc(String(id)).delete();}catch(e){}}
async function fsClearDone(){try{const s=await doneRef().get();const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit();}catch(e){}}
async function fsSaveDiary(key,entry){try{await diaryRef().doc(key).set(entry);}catch(e){}}
async function fsUndo(task){
  setSyncing();
  try{const b=db.batch();b.delete(doneRef().doc(String(task.id)));const{completedAt,...orig}=task;b.set(tasksRef().doc(String(task.id)),orig);await b.commit();setSyncOk();}catch(e){}
}

function startListeners(){
  tasksRef().orderBy('created','asc').onSnapshot(snap=>{S.tasks=snap.docs.map(d=>({id:d.id,...d.data()}));render();},()=>{});
  doneRef().orderBy('completedAt','desc').limit(200).onSnapshot(snap=>{S.done=snap.docs.map(d=>({id:d.id,...d.data()}));render();},()=>{});
  diaryRef().onSnapshot(snap=>{S.diary={};snap.docs.forEach(d=>{S.diary[d.id]=d.data();});if(S.ui.tab==='diary'||S.ui.tab==='stats')render();},()=>{});
}

/* ══ INIT ══ */
function initApp(){
  loadLocal();
  initScene();initQuote();initNav();
  setSyncing();startListeners();render();
}
function initScene(){
  const scene=SCENES[doyIdx()%SCENES.length];
  ge('bg').innerHTML=scene.svg;
  if(scene.dark)document.body.classList.add('dk');
}
function initQuote(){
  const q=QUOTES[doyIdx()%QUOTES.length];
  const pop=ge('qpopover');
  pop.innerHTML=`<div class="ql">今日の言葉</div><div class="qt">\u201c${q.en}\u201d</div><div class="qj">${q.ja}</div><div class="qa">— ${q.au}</div>`;
  ge('qpill-btn').onclick=()=>pop.classList.toggle('open');
  document.addEventListener('click',e=>{if(!ge('qpill').contains(e.target))pop.classList.remove('open');});
}
function initNav(){
  const nav=ge('bnav');nav.innerHTML='';
  TABS.forEach(t=>{
    const b=$e('button','ntab');
    b.innerHTML=`<span class="ni">${t.icon}</span><span>${t.label}</span>`;
    if(t.id===S.ui.tab)b.classList.add('act');
    b.addEventListener('click',()=>switchTab(t.id));
    nav.appendChild(b);
  });
}

/* ══ TABS ══ */
function switchTab(id){
  S.ui.tab=id;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach((b,i)=>b.classList.toggle('act',TABS[i].id===id));
  ge('v-'+id).classList.add('active');render();
}
function render(){
  switch(S.ui.tab){
    case 'today':    renderToday();    break;
    case 'tasks':    renderTasks();    break;
    case 'diary':    renderDiary();    break;
    case 'stats':    renderStats();    break;
    case 'settings': renderSettings(); break;
  }
}

/* ══ TASK CARD ══ */
function buildTaskCard(task){
  const cat=catById(task.cat);const chip=dueInfo(task.due);
  const wrap=$e('div','tw');const bg=$e('div','del-bg');bg.textContent='🗑';wrap.appendChild(bg);
  const item=$e('div','task g');
  if(task.urgent)item.classList.add('urg-task');
  if(chip&&chip.isOv)item.classList.add('ov-task');
  const cb=$e('button','cb');cb.textContent='✓';
  cb.addEventListener('click',()=>{item.classList.add('out');setTimeout(()=>fsComplete({...task,completedAt:Date.now()}),270);showUndo({...task,completedAt:Date.now()});});
  item.appendChild(cb);
  const body=$e('div','tbody');
  const txt=$e('div','ttxt');txt.textContent=task.text;
  txt.addEventListener('dblclick',()=>startEdit(txt,task));
  body.appendChild(txt);
  const meta=$e('div','tmeta');
  const cb2=$e('span','cat-badge');cb2.style.color=cat.color;cb2.style.background=cat.bg;cb2.style.borderColor=cat.color+'55';cb2.textContent=cat.icon+' '+cat.label;meta.appendChild(cb2);
  if(task.urgent){const c=$e('span','chip ch-urg');c.textContent='🔥 急ぎ';meta.appendChild(c);}
  if(chip){const c=$e('span','chip '+chip.cls);c.textContent=chip.label;meta.appendChild(c);}
  body.appendChild(meta);item.appendChild(body);
  const acts=$e('div','tacts');
  const ub2=$e('button','tb urgb'+(task.urgent?' on':''));ub2.textContent='!';
  ub2.addEventListener('click',()=>{task.urgent=!task.urgent;fsUpdate(task);});
  const db2=$e('button','tb del');db2.textContent='✕';
  db2.addEventListener('click',()=>{item.classList.add('out');setTimeout(()=>fsDel(task.id),270);});
  acts.appendChild(ub2);acts.appendChild(db2);item.appendChild(acts);wrap.appendChild(item);
  addSwipe(item,()=>fsDel(task.id));
  return wrap;
}

/* ══ TODAY ══ */
function renderToday(){

  const days=['日','月','火','水','木','金','土'];
  const todayTasks=S.tasks.filter(t=>isToday(t));
  const hd=$e('div','today-hd g');
  hd.innerHTML=`<div><div class="greet">${greet}</div><div class="today-date">${(n.getMonth()+1)}月${n.getDate()}日（${days[n.getDay()]}）</div></div><div class="today-meta"><div class="today-count">${todayTasks.length}</div><div class="today-count-lbl">今日のタスク</div></div>`;
  v.appendChild(hd);
  const bd=$e('button','brain-dump-btn');bd.innerHTML='🧠 脳のダンプ';bd.addEventListener('click',openBrainDump);v.appendChild(bd);
  // Quote card inline

  v.appendChild(qc);
  v.appendChild(buildInputCard());
  if(todayTasks.length){
    const sh=$e('div','sec-hd');sh.innerHTML=`<span class="sl">今日やること</span><div class="sln"></div><span class="sbd">${todayTasks.length}</span>`;v.appendChild(sh);
    const list=$e('div','');todayTasks.forEach(t=>list.appendChild(buildTaskCard(t)));v.appendChild(list);
  }else{
    const es=$e('div','empty-state');es.innerHTML='<div class="ei">✨</div><div class="et">今日のタスクなし！いい感じ</div>';v.appendChild(es);
  }
  const inbox=S.tasks.filter(t=>t.cat==='inbox');
  if(inbox.length){
    const ih=$e('div','done-hd');ih.classList.toggle('coll',S.ui.inboxColl);
    ih.innerHTML=`<span class="sl">📥 Inbox</span><div class="sln"></div><span class="sbd">${inbox.length}</span><span class="dar">▾</span>`;
    ih.addEventListener('click',()=>{S.ui.inboxColl=!S.ui.inboxColl;saveLocal();renderToday();});v.appendChild(ih);
    const iw=$e('div','dl-wrap');iw.classList.toggle('hid',S.ui.inboxColl);
    inbox.forEach(t=>{
      const row=$e('div','inbox-item g');const tx=$e('div','inbox-txt');tx.textContent=t.text;row.appendChild(tx);
      const cats2=$e('div','inbox-cats');
      S.cats.filter(c=>!c.system).slice(0,3).forEach(c=>{const b=$e('button','icat-btn');b.textContent=c.icon+' '+c.label;b.addEventListener('click',()=>{t.cat=c.id;fsUpdate(t);});cats2.appendChild(b);});
      const dx=$e('button','icat-btn');dx.textContent='✕';dx.style.color='#A8200E';dx.addEventListener('click',()=>fsDel(t.id));cats2.appendChild(dx);
      row.appendChild(cats2);iw.appendChild(row);
    });v.appendChild(iw);
  }
  const doneToday=S.done.filter(t=>{const d=new Date(t.completedAt);return d.toDateString()===new Date().toDateString();});
  if(doneToday.length){
    const dh2=$e('div','sec-hd');dh2.style.marginTop='1.2rem';dh2.innerHTML=`<span class="sl">今日完了</span><div class="sln"></div><span class="sbd">${doneToday.length}</span>`;v.appendChild(dh2);
    const dl2=$e('div','done-list');
    doneToday.forEach(t=>{
      const item=$e('div','di g');
      const ck=$e('div','dck');ck.textContent='✓';
      const tx=$e('div','dtx');tx.textContent=t.text;
      const dt=$e('div','ddt');dt.textContent=fmtTs(t.completedAt);
      const dx=$e('button','ddl');dx.textContent='✕';dx.addEventListener('click',()=>fsDelDone(t.id));
      item.appendChild(ck);item.appendChild(tx);item.appendChild(dt);item.appendChild(dx);dl2.appendChild(item);
    });v.appendChild(dl2);
    if(doneToday.length>1){
      const clrb=$e('button','clr-done-btn');clrb.style.display='inline';clrb.textContent='今日の完了を全部消す';
      clrb.addEventListener('click',async()=>{const b=db.batch();doneToday.forEach(t=>b.delete(doneRef().doc(String(t.id))));await b.commit();});
      v.appendChild(clrb);
    }

/* ══ INPUT CARD ══ */

  const icard=$e('div','icard g');const ir1=$e('div','ir1');

  const addbtn=$e('button','ibtn btn-add');addbtn.textContent='追加';
  ir1.appendChild(inp);ir1.appendChild(duebtn);ir1.appendChild(flbtn);ir1.appendChild(addbtn);icard.appendChild(ir1);
  const catrow=$e('div','cat-row');
  (S.cats||DEFAULT_CATS).forEach(c=>{const b=$e('button','cpill'+(S.ui.curCat===c.id?' sel':''));b.style.setProperty('--cc',c.color);b.style.setProperty('--cbg',c.bg);b.innerHTML=`<span>${c.icon}</span><span>${c.label}</span>`;b.addEventListener('click',()=>{S.ui.curCat=c.id;render();});catrow.appendChild(b);});icard.appendChild(catrow);
  const ir2=$e('div','ir2'+(S.ui.showDue?' open':''));const dl2=$e('label','');dl2.textContent='期日';
  const di=$e('input','date-inp');di.type='date';const clr=$e('button','ibtn');clr.textContent='✕';clr.addEventListener('click',()=>di.value='');
  ir2.appendChild(dl2);ir2.appendChild(di);ir2.appendChild(clr);icard.appendChild(ir2);
  function doAdd(){const text=inp.value.trim();if(!text)return;const task={id:Date.now(),text,cat:S.ui.curCat,urgent:S.ui.flagged,due:di.value||null,created:Date.now()};inp.value='';di.value='';S.ui.flagged=false;S.ui.showDue=false;fsAdd(task);render();inp.focus();}
  addbtn.addEventListener('click',doAdd);inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
  duebtn.addEventListener('click',()=>{S.ui.showDue=!S.ui.showDue;ir2.classList.toggle('open',S.ui.showDue);duebtn.classList.toggle('on',S.ui.showDue);if(S.ui.showDue)di.focus();});
  flbtn.addEventListener('click',()=>{S.ui.flagged=!S.ui.flagged;flbtn.classList.toggle('on',S.ui.flagged);});
  return icard;
}

/* ══ TASKS ══ */
function renderTasks(){
  const v=ge('v-tasks');v.innerHTML='';v.appendChild(buildInputCard());
  const sb=$e('div','search-bar g');const sico=$e('span','sico');sico.textContent='🔍';
  const si=$e('input','');si.type='text';si.placeholder='検索…';si.value=S.ui.search;
  si.addEventListener('input',()=>{S.ui.search=si.value;renderTasks();});sb.appendChild(sico);sb.appendChild(si);v.appendChild(sb);
  const ft=$e('div','ftabs');
  [['all','すべて'],['today','今日'],['tomorrow','明日'],['overdue','期限切れ']].forEach(([id,label])=>{
    const b=$e('button','ftab'+(S.ui.filterDate===id?' act':''));b.textContent=label;
    const ct=id==='all'?S.tasks.length:id==='today'?S.tasks.filter(t=>isToday(t)).length:id==='tomorrow'?S.tasks.filter(t=>isTomorrow(t)).length:S.tasks.filter(t=>isOverdue(t)).length;
    if(ct&&id!=='all'){const cs=$e('span','tct');cs.textContent=ct;b.appendChild(cs);}
    b.addEventListener('click',()=>{S.ui.filterDate=id;renderTasks();});ft.appendChild(b);
  });v.appendChild(ft);
  let list=[...S.tasks];
  if(S.ui.search){const q=S.ui.search.toLowerCase();list=list.filter(t=>t.text.toLowerCase().includes(q));}
  if(S.ui.filterDate==='today')list=list.filter(t=>isToday(t));
  else if(S.ui.filterDate==='tomorrow')list=list.filter(t=>isTomorrow(t));
  else if(S.ui.filterDate==='overdue')list=list.filter(t=>isOverdue(t));
  list.sort((a,b)=>{if(a.urgent!==b.urgent)return b.urgent-a.urgent;if(a.due&&b.due)return a.due.localeCompare(b.due);if(a.due)return -1;if(b.due)return 1;return a.created-b.created;});
  const tl=$e('div','');tl.id='tl';
  if(!list.length){const es=$e('div','empty-state');es.innerHTML='<div class="ei">🏮</div><div class="et">タスクなし</div>';v.appendChild(es);}
  else{list.forEach(t=>tl.appendChild(buildTaskCard(t)));v.appendChild(tl);}
  if(!S.done.length)return;
  const dh=$e('div','done-hd');dh.classList.toggle('coll',S.ui.doneColl);
  dh.innerHTML=`<span class="sl">完了</span><div class="sln"></div><span class="sbd">${S.done.length}</span><span class="dar">▾</span>`;
  dh.addEventListener('click',()=>{S.ui.doneColl=!S.ui.doneColl;saveLocal();renderTasks();});v.appendChild(dh);
  const dlw=$e('div','dl-wrap done-list');dlw.classList.toggle('hid',S.ui.doneColl);
  S.done.forEach(t=>{
    const cat=catById(t.cat);const item=$e('div','di g');const ck=$e('div','dck');ck.textContent='✓';
    const tx=$e('div','dtx');tx.textContent=cat.icon+' '+t.text;const dt=$e('div','ddt');dt.textContent=fmtTs(t.completedAt);
    const dx=$e('button','ddl');dx.textContent='✕';dx.addEventListener('click',()=>fsDelDone(t.id));
    item.appendChild(ck);item.appendChild(tx);item.appendChild(dt);item.appendChild(dx);dlw.appendChild(item);
  });v.appendChild(dlw);
  if(S.done.length>1&&!S.ui.doneColl){const clrb=$e('button','clr-done-btn');clrb.style.display='inline';clrb.textContent='完了済みを全部消す';clrb.addEventListener('click',fsClearDone);v.appendChild(clrb);}
}

/* ══ EDIT ══ */
function startEdit(el,task){
  el.contentEditable='true';el.focus();
  const r=document.createRange();r.selectNodeContents(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}if(e.key==='Escape'){el.textContent=task.text;el.blur();}});
  el.addEventListener('blur',()=>{task.text=el.textContent.trim()||task.text;el.textContent=task.text;el.contentEditable='false';fsUpdate(task);},{once:true});
}

/* ══ SWIPE ══ */
function addSwipe(el,onDelete){
  let sx,sy,drag=false,moved=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=false;moved=false;el.style.transition='none';},{passive:true});
  el.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(!moved){if(Math.abs(dx)>Math.abs(dy)&&dx<-10){drag=true;moved=true;}else if(Math.abs(dy)>10)moved=true;}if(drag){e.preventDefault();el.style.transform='translateX('+Math.max(Math.min(dx,0),-90)+'px)';}},{passive:false});
  el.addEventListener('touchend',e=>{if(!drag)return;drag=false;const dx=e.changedTouches[0].clientX-sx;el.style.transition='';if(dx<-65){el.style.transition='transform .22s,opacity .22s';el.style.transform='translateX(-110px)';el.style.opacity='0';setTimeout(onDelete,230);}else el.style.transform='';});
}

/* ══ BRAIN DUMP ══ */
function categorize(text){const t=text.toLowerCase();if(/ジム|gym|筋トレ|運動|walk|散歩|食事|飯|風呂|sleep|寝|掃除|洗濯/.test(t))return'daily';if(/アイデア|idea|案|ビジネス|business|startup|サービス|プロダクト/.test(t))return'idea';if(/行く|go to|visit|カフェ|cafe|レストラン|場所|place|スポット/.test(t))return'place';if(/メモ|note|覚え|情報|資料|調べ/.test(t))return'memo';return'todo';}
function openBrainDump(){ge('bd-overlay').classList.add('open');ge('dump-area').focus();ge('dump-add-all').style.display='none';ge('dump-result').className='dump-result';ge('dump-result').innerHTML='';dumpItems=[];}
function closeBrainDump(){ge('bd-overlay').classList.remove('open');}
ge('bd-close').addEventListener('click',closeBrainDump);
ge('bd-overlay').addEventListener('click',e=>{if(e.target===ge('bd-overlay'))closeBrainDump();});
ge('dump-organize').addEventListener('click',()=>{
  const raw=ge('dump-area').value.trim();if(!raw)return;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  dumpItems=lines.map((text,i)=>({id:i,text,cat:categorize(text),urgent:false}));
  const res=ge('dump-result');res.className='dump-result show';res.innerHTML='';
  dumpItems.forEach(item=>{
    const row=$e('div','dump-item g');const tx=$e('div','dump-item-txt');tx.textContent=item.text;
    const sel=$e('select','dump-cat-sel');S.cats.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.icon+' '+c.label;if(c.id===item.cat)o.selected=true;sel.appendChild(o);});
    sel.addEventListener('change',()=>item.cat=sel.value);
    const urg=$e('button','dump-urg');urg.textContent='🔥';urg.addEventListener('click',()=>{item.urgent=!item.urgent;urg.classList.toggle('on',item.urgent);});
    const rm=$e('button','dump-rm');rm.textContent='✕';rm.addEventListener('click',()=>{dumpItems=dumpItems.filter(d=>d.id!==item.id);row.remove();if(!dumpItems.length)ge('dump-add-all').style.display='none';});
    row.appendChild(tx);row.appendChild(sel);row.appendChild(urg);row.appendChild(rm);res.appendChild(row);
  });
  ge('dump-add-all').style.display=dumpItems.length?'flex':'none';
});
ge('dump-add-all').addEventListener('click',()=>{
  dumpItems.forEach(item=>{if(item.text)fsAdd({id:Date.now()+Math.random(),text:item.text,cat:item.cat,urgent:item.urgent,due:null,created:Date.now()});});
  closeBrainDump();ge('dump-area').value='';dumpItems=[];
});

/* ══ DIARY ══ */
function renderDiary(){
  const v=ge('v-diary');v.innerHTML='';const key=S.ui.diaryDate;const entry=S.diary[key]||{text:'',mood:-1,tags:[]};
  const nav=$e('div','diary-nav');
  const prev=$e('button','diary-nav-btn');prev.textContent='◀';prev.addEventListener('click',()=>{const d=new Date(key);d.setDate(d.getDate()-1);S.ui.diaryDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');renderDiary();});
  const lbl=$e('div','diary-date-lbl');lbl.textContent=fmtKeyLong(key);
  const nxt=$e('button','diary-nav-btn');nxt.textContent='▶';nxt.disabled=key===todayKey();nxt.style.opacity=nxt.disabled?'0.3':'';
  nxt.addEventListener('click',()=>{if(nxt.disabled)return;const d=new Date(key);d.setDate(d.getDate()+1);S.ui.diaryDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');renderDiary();});
  nav.appendChild(prev);nav.appendChild(lbl);nav.appendChild(nxt);v.appendChild(nav);
  const mr=$e('div','mood-row');
  MOODS.forEach((m,i)=>{const b=$e('button','mood-btn'+(i===entry.mood?' sel':''));b.textContent=m;b.addEventListener('click',()=>{entry.mood=i;mr.querySelectorAll('.mood-btn').forEach((mb,j)=>mb.classList.toggle('sel',j===i));fsSaveDiary(key,{...entry});});mr.appendChild(b);});v.appendChild(mr);
  const ta=$e('textarea','diary-area g');ta.placeholder='今日のことを書こう…';ta.value=entry.text;ta.id='diary-ta';
  let saveTimer=null;
  ta.addEventListener('input',()=>{entry.text=ta.value;clearTimeout(saveTimer);saveTimer=setTimeout(()=>fsSaveDiary(key,{...entry}),3000);});
  ta.addEventListener('blur',()=>{clearTimeout(saveTimer);if(entry.text!==undefined)fsSaveDiary(key,{...entry});});
  v.appendChild(ta);
  const tr=$e('div','diary-tags');
  DIARY_TAGS.forEach(tag=>{const b=$e('button','diary-tag'+((entry.tags||[]).includes(tag)?' sel':''));b.textContent=tag;b.addEventListener('click',()=>{if(!entry.tags)entry.tags=[];const idx=entry.tags.indexOf(tag);if(idx>=0)entry.tags.splice(idx,1);else entry.tags.push(tag);b.classList.toggle('sel',entry.tags.includes(tag));fsSaveDiary(key,{...entry});});tr.appendChild(b);});v.appendChild(tr);
  const keys=Object.keys(S.diary).filter(k=>S.diary[k].text&&k!==key).sort().reverse().slice(0,8);
  if(keys.length){const sh=$e('div','sec-hd');sh.innerHTML='<span class="sl">過去の日記</span><div class="sln"></div>';v.appendChild(sh);keys.forEach(k=>{const e2=S.diary[k];const card=$e('div','diary-entry-card g');const dt=$e('div','dec-date');dt.textContent=fmtKey(k);const mood=$e('div','dec-mood');mood.textContent=e2.mood>=0?MOODS[e2.mood]:'';const prev2=$e('div','dec-preview');prev2.textContent=(e2.text||'').slice(0,60);card.appendChild(dt);card.appendChild(mood);card.appendChild(prev2);card.addEventListener('click',()=>{S.ui.diaryDate=k;renderDiary();});v.appendChild(card);});}
}

/* ══ STATS ══ */
function renderStats(){
  const v=ge('v-stats');v.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);const weekAgo=new Date(today);weekAgo.setDate(weekAgo.getDate()-7);
  const doneToday=S.done.filter(t=>new Date(t.completedAt)>=today).length;
  const doneWeek=S.done.filter(t=>new Date(t.completedAt)>=weekAgo).length;
  let streak=0;for(let i=0;i<60;i++){const d=new Date(today);d.setDate(d.getDate()-i);const has=S.done.some(t=>{const td=new Date(t.completedAt);td.setHours(0,0,0,0);return td.getTime()===d.getTime();});if(has)streak++;else if(i>0)break;}
  const sb=$e('div','streak-badge g');sb.innerHTML=`<span class="streak-num">🔥${streak}</span><span class="streak-lbl">日連続完了</span>`;v.appendChild(sb);
  const sg=$e('div','stat-grid');[[doneToday,'今日完了'],[doneWeek,'今週完了'],[S.done.length,'合計完了'],[S.tasks.length,'残タスク']].forEach(([n,l])=>{const c=$e('div','stat-card g');c.innerHTML=`<div class="stat-num">${n}</div><div class="stat-lbl">${l}</div>`;sg.appendChild(c);});v.appendChild(sg);
  const sh=$e('div','sec-hd');sh.innerHTML='<span class="sl">カテゴリ別完了</span><div class="sln"></div>';v.appendChild(sh);
  const total=S.done.length||1;S.cats.forEach(cat=>{const ct=S.done.filter(t=>t.cat===cat.id).length;if(!ct)return;const row=$e('div','bar-row');const lbl=$e('div','bar-lbl');lbl.textContent=cat.icon+' '+cat.label;const track=$e('div','bar-track');const fill=$e('div','bar-fill');fill.style.width=(ct/total*100)+'%';fill.style.background=cat.color;track.appendChild(fill);const num=$e('div','bar-ct');num.textContent=ct;row.appendChild(lbl);row.appendChild(track);row.appendChild(num);v.appendChild(row);});
}

/* ══ SETTINGS ══ */
function renderSettings(){
  const v=ge('v-settings');v.innerHTML='';
  // User info
  const s0=$e('div','settings-section');s0.innerHTML='<h3>アカウント</h3>';
  const urow=$e('div','user-row g');
  if(currentUser.photoURL){const img=$e('img','user-avatar');img.src=currentUser.photoURL;urow.appendChild(img);}
  else{const pl=$e('div','user-avatar-placeholder');pl.textContent='👤';urow.appendChild(pl);}
  const uinfo=$e('div','sr-label');uinfo.innerHTML=`<div style="font-weight:600">${currentUser.displayName||'ユーザー'}</div><div class="sr-sub">${currentUser.email}</div>`;
  const so=$e('button','signout-btn');so.textContent='ログアウト';so.addEventListener('click',()=>auth.signOut());
  urow.appendChild(uinfo);urow.appendChild(so);s0.appendChild(urow);v.appendChild(s0);
  // Cats
  const s1=$e('div','settings-section');s1.innerHTML='<h3>カテゴリ編集</h3>';
  S.cats.forEach(cat=>{const row=$e('div','cat-edit-row g');const ico=$e('span','');ico.textContent=cat.icon;ico.style.cssText='font-size:22px;min-width:28px';const inp2=$e('input','cat-name-inp');inp2.type='text';inp2.value=cat.label;inp2.disabled=!!cat.system;inp2.addEventListener('blur',()=>{cat.label=inp2.value.trim()||cat.label;saveLocal();});const cb=$e('input','');cb.type='color';cb.value=cat.color;cb.style.cssText='width:24px;height:24px;border:none;cursor:pointer;border-radius:4px;padding:0;flex-shrink:0';cb.addEventListener('input',()=>{cat.color=cb.value;saveLocal();});row.appendChild(ico);row.appendChild(inp2);if(!cat.system)row.appendChild(cb);s1.appendChild(row);});v.appendChild(s1);
  // Export
  const s2=$e('div','settings-section');s2.innerHTML='<h3>データ</h3>';
  const er=$e('div','setting-row g');er.style.flexDirection='column';er.style.alignItems='flex-start';
  const el2=$e('div','sr-label');el2.textContent='エクスポート / インポート';
  const btns=$e('div','export-btns');
  const exb=$e('button','btn-sm');exb.textContent='⬇️ エクスポート';exb.addEventListener('click',exportData);
  const imb=$e('button','btn-sm');imb.textContent='⬆️ インポート';imb.addEventListener('click',importData);
  btns.appendChild(exb);btns.appendChild(imb);er.appendChild(el2);er.appendChild(btns);s2.appendChild(er);v.appendChild(s2);
  const s3=$e('div','settings-section');s3.innerHTML='<h3>このアプリについて</h3>';
  const arow=$e('div','setting-row g');arow.innerHTML='<div><div class="sr-label">📱 iOSにインストール</div><div class="sr-sub">Safariで開く → 共有ボタン → ホーム画面に追加</div></div>';s3.appendChild(arow);v.appendChild(s3);
}

/* ══ EXPORT / IMPORT ══ */
function exportData(){const data={tasks:S.tasks,done:S.done,diary:S.diary,exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='todo_'+todayKey()+'.json';a.click();URL.revokeObjectURL(url);}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.addEventListener('change',()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{try{const d=JSON.parse(e.target.result);if(d.tasks){const b=db.batch();d.tasks.forEach(t=>b.set(tasksRef().doc(String(t.id)),t));await b.commit();}if(d.done){const b=db.batch();d.done.forEach(t=>b.set(doneRef().doc(String(t.id)),t));await b.commit();}if(d.diary){for(const[k,val] of Object.entries(d.diary))await fsSaveDiary(k,val);}alert('インポート完了！');}catch(err){alert('エラー');}};r.readAsText(f);});inp.click();}

/* ══ UNDO ══ */
function showUndo(task){clearTimeout(undoTimer);undoTask=task;ge('um').textContent='「'+task.text.slice(0,14)+(task.text.length>14?'…':'')+'」を完了';const ub=ge('ub');ub.classList.add('show');const up=ge('up');up.style.transition='none';up.style.transform='scaleX(1)';requestAnimationFrame(()=>requestAnimationFrame(()=>{up.style.transition='transform 15s linear';up.style.transform='scaleX(0)';}));undoTimer=setTimeout(()=>{ub.classList.remove('show');undoTask=null;},15000);}
ge('ubtn').addEventListener('click',()=>{if(!undoTask)return;clearTimeout(undoTimer);fsUndo(undoTask);undoTask=null;ge('ub').classList.remove('show');});

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();const inp=document.querySelector('.task-inp');if(inp)inp.focus();}if((e.metaKey||e.ctrlKey)&&e.key==='b'){e.preventDefault();openBrainDump();}});
</script>
