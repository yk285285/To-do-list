<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Todo">
<title>Todo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23A8200E'/><path d='M7 17l5 5L25 10' stroke='%23F5E8C8' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%23A8200E'/><path d='M38 96l30 30L142 54' stroke='%23F5E8C8' stroke-width='16' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<style>
/* ════════ RESET & BASE ════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif;
  background:#E8DCC8;color:#1A0E06;
  display:flex;flex-direction:column;
}
body.dk{color:#F0E4CC}
input,textarea,button,select{font-family:inherit}

/* ════════ BACKGROUND ════════ */
#bg{position:fixed;inset:0;z-index:0}
#bg svg{width:100%;height:100%;display:block}

/* ════════ GLASS ════════ */
.g{
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.65);
  box-shadow:0 2px 16px rgba(0,0,0,.08);
}
body.dk .g{background:rgba(8,4,2,.68);border-color:rgba(255,255,255,.10);box-shadow:0 2px 16px rgba(0,0,0,.35)}

/* ════════ LAYOUT ════════ */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;width:100%}
#views{flex:1;overflow:hidden;position:relative}
.view{
  position:absolute;inset:0;overflow-y:auto;
  padding:0 .85rem;
  padding-bottom:calc(5rem + env(safe-area-inset-bottom));
  padding-top:.6rem;
  display:none;
}
.view.active{display:block}
.view::-webkit-scrollbar{display:none}

/* ════════ QUOTE PILL ════════ */
#qpill{
  position:fixed;top:calc(.7rem + env(safe-area-inset-top));right:.85rem;z-index:50;
}
#qpill-btn{
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(168,32,14,.88);color:#F5E8C8;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(168,32,14,.4);
  transition:transform .2s;
}
#qpill-btn:active{transform:scale(.9)}
#qpopover{
  position:absolute;right:0;top:38px;width:260px;
  border-radius:12px;padding:13px;
  display:none;animation:fadeIn .18s ease;
}
#qpopover.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ql{font-size:10px;font-weight:700;letter-spacing:.1em;color:#A8200E;text-transform:uppercase;margin-bottom:5px}
.qt{font-size:12px;line-height:1.6;font-style:italic;opacity:.9}
.qj{font-size:11px;opacity:.5;margin-top:3px;line-height:1.5}
.qa{font-size:10px;opacity:.4;margin-top:5px;text-align:right}

/* ════════ BOTTOM NAV ════════ */
.bnav{
  position:relative;z-index:10;flex-shrink:0;
  display:flex;align-items:stretch;
  padding-bottom:env(safe-area-inset-bottom);
  border-top:1px solid rgba(255,255,255,.4);
}
body.dk .bnav{border-top-color:rgba(255,255,255,.1)}
.bnav{background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
body.dk .bnav{background:rgba(8,4,2,.78)}
.ntab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:7px 4px 8px;cursor:pointer;border:none;background:transparent;
  color:inherit;opacity:.4;transition:opacity .15s;font-size:10px;font-weight:500;
}
.ntab .ni{font-size:20px;line-height:1}
.ntab.act{opacity:1;color:#A8200E}
body.dk .ntab.act{color:#E04030}

/* ════════ SECTION HEADERS ════════ */
.sec-hd{display:flex;align-items:center;gap:9px;margin:1.1rem 0 .6rem}
.sec-hd .sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.sec-hd .sln{flex:1;height:.5px;background:rgba(128,80,40,.15)}
body.dk .sec-hd .sln{background:rgba(255,255,255,.1)}
.sec-hd .sbd{font-size:11px;opacity:.5;background:rgba(128,80,40,.08);padding:1px 8px;border-radius:20px}

/* ════════ INPUT CARD ════════ */
.icard{border-radius:14px;padding:10px;margin-bottom:.8rem}
.ir1{display:flex;align-items:center;gap:6px}
.task-inp{
  flex:1;border:none;background:transparent;font-size:14px;
  color:inherit;outline:none;padding:6px 4px;min-width:0;
}
.task-inp::placeholder{opacity:.4}
.cat-row{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid rgba(128,80,40,.1);overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
body.dk .cat-row{border-top-color:rgba(255,255,255,.08)}
.cpill{
  display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;
  border:1.5px solid rgba(128,80,40,.15);background:transparent;
  cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;
  color:inherit;opacity:.6;transition:all .15s;flex-shrink:0;
}
.cpill.sel{opacity:1;border-color:var(--cc);background:var(--cbg);color:var(--cc)}
.ir2{display:none;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(128,80,40,.1)}
body.dk .ir2{border-top-color:rgba(255,255,255,.08)}
.ir2.open{display:flex}
.ir2 label{font-size:12px;opacity:.5;flex-shrink:0}
.date-inp{
  border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.3);
  color:inherit;font-size:12px;padding:5px 9px;outline:none;flex:1;
}
body.dk .date-inp{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}

/* ════════ BUTTONS ════════ */
.ibtn{
  border:1.5px solid transparent;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:8px;
  transition:all .14s;flex-shrink:0;height:34px;padding:0 10px;
  font-size:12px;color:inherit;opacity:.55;font-weight:500;white-space:nowrap;
}
.ibtn:active{transform:scale(.9)}
.ibtn:hover{opacity:1;background:rgba(128,80,40,.08)}
.ibtn.due.on{opacity:1;color:#9A6C10}
.ibtn.urg.on{opacity:1;background:#A8200E;color:#F5E8C8;border-color:transparent}
.btn-add{opacity:1;background:#A8200E;color:#F5E8C8;border-color:transparent;font-weight:600}
.btn-add:hover{background:#C8321E}
.btn-sm{
  display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:9px;border:1px solid rgba(128,80,40,.2);background:transparent;
  cursor:pointer;font-size:12px;font-weight:500;color:inherit;opacity:.7;transition:all .14s;
}
.btn-sm:hover{opacity:1;background:rgba(128,80,40,.08)}
.btn-sm:active{transform:scale(.93)}
.btn-sm.red{border-color:rgba(168,32,14,.3);color:#A8200E}
.btn-sm.red:hover{background:rgba(168,32,14,.08)}
.btn-primary{background:#A8200E;color:#F5E8C8;border-color:transparent;opacity:1}
.btn-primary:hover{background:#C8321E}

/* ════════ SEARCH ════════ */
.search-bar{
  display:flex;align-items:center;gap:8px;border-radius:11px;
  padding:8px 12px;margin-bottom:.75rem;
}
.search-bar input{
  flex:1;border:none;background:transparent;font-size:14px;
  color:inherit;outline:none;
}
.search-bar input::placeholder{opacity:.4}
.search-bar .sico{opacity:.4;font-size:16px}

/* ════════ FILTER TABS ════════ */
.ftabs{display:flex;gap:5px;margin-bottom:.75rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{
  display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;
  background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.5);
  cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;
  color:inherit;opacity:.65;transition:all .15s;flex-shrink:0;
}
body.dk .ftab{background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.08)}
.ftab.act{opacity:1;background:rgba(255,255,255,.85);color:#1A0E06}
body.dk .ftab.act{background:rgba(255,255,255,.15);color:#F0E4CC}
.ftab .tct{font-size:10px;opacity:.55}

/* ════════ TASK ITEMS ════════ */
#tl,#inbox-list,.done-list{display:flex;flex-direction:column;gap:4px}
.tw{position:relative;border-radius:12px;overflow:hidden}
.del-bg{
  position:absolute;right:0;top:0;bottom:0;width:68px;
  background:#A8200E;display:flex;align-items:center;justify-content:center;
  color:#F5E8C8;font-size:18px;border-radius:0 12px 12px 0;
}
.task{
  position:relative;display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:12px;
  transition:transform .25s cubic-bezier(.25,.46,.45,.94),opacity .25s,max-height .28s;
  max-height:150px;overflow:hidden;animation:tIn .18s ease;touch-action:pan-y;
  cursor:default;
}
@keyframes tIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.task.urg-task{border-left:3px solid #A8200E}
.task.ov-task{border-left:3px solid #9A6C10}
.task.out{opacity:0;transform:translateX(45px);max-height:0;padding:0;margin:0;pointer-events:none}
.task[draggable="true"]{cursor:grab}
.task.drag-over{border:2px dashed rgba(168,32,14,.5);background:rgba(168,32,14,.05)}

.cb{
  width:20px;height:20px;min-width:20px;border-radius:50%;
  border:1.5px solid rgba(128,80,40,.3);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;
  margin-top:2px;transition:all .15s;
}
body.dk .cb{border-color:rgba(255,255,255,.2)}
.cb:hover,.cb:active{border-color:#2A5C38;background:rgba(42,92,56,.15);color:#2A5C38}
body.dk .cb:hover{border-color:#48A060;background:rgba(72,160,96,.18);color:#48A060}

.drag-handle{
  width:16px;min-width:16px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;opacity:.2;cursor:grab;padding-top:4px;
}
.drag-handle span{display:block;width:10px;height:1.5px;background:currentColor;border-radius:1px}
.drag-handle:hover{opacity:.5}

.tbody{flex:1;min-width:0}
.ttxt{font-size:14px;line-height:1.45;word-break:break-word;outline:none;border-radius:4px}
.ttxt[contenteditable="true"]{background:rgba(128,80,40,.08);padding:2px 5px;margin:-2px -5px}
.tmeta{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.ch-urg{background:rgba(168,32,14,.12);color:#A8200E;border:1px solid rgba(168,32,14,.2)}
.ch-ov{background:rgba(154,108,16,.12);color:#9A6C10;border:1px solid rgba(154,108,16,.2)}
.ch-today{background:rgba(42,92,56,.12);color:#2A5C38;border:1px solid rgba(42,92,56,.2)}
.ch-soon{background:rgba(74,114,184,.12);color:#4A72B8;border:1px solid rgba(74,114,184,.2)}
.ch-due{background:rgba(128,80,40,.08);color:inherit;opacity:.65;border:1px solid rgba(128,80,40,.12)}
.cat-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid}

.tacts{display:flex;align-items:center;gap:1px;flex-shrink:0;transition:opacity .12s}
@media(hover:hover){.task:not(:hover) .tacts{opacity:0}}
@media(hover:none){.tacts{opacity:1}}
.tb{
  width:28px;height:28px;border-radius:7px;border:none;
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:13px;transition:background .12s;color:inherit;opacity:.45;
}
.tb:hover{opacity:1;background:rgba(128,80,40,.1)}
.tb.del:hover{background:rgba(168,32,14,.1);color:#A8200E;opacity:1}
.tb.urgb{font-weight:800;font-size:15px}
.tb.urgb.on{color:#A8200E;opacity:1}

.empty-state{text-align:center;padding:2.5rem 0;opacity:.5}
.empty-state .ei{font-size:36px;margin-bottom:8px}
.empty-state .et{font-size:13px}

/* ════════ DONE LIST ════════ */
.done-hd{
  display:flex;align-items:center;gap:9px;margin:1.1rem 0 .6rem;
  cursor:pointer;user-select:none;opacity:.7;
}
.done-hd:hover{opacity:1}
.done-hd .sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.done-hd .sln{flex:1;height:.5px;background:rgba(128,80,40,.15)}
body.dk .done-hd .sln{background:rgba(255,255,255,.1)}
.done-hd .sbd{font-size:11px;opacity:.6;background:rgba(128,80,40,.08);padding:1px 8px;border-radius:20px}
.done-hd .dar{font-size:10px;opacity:.5;transition:transform .18s}
.done-hd.coll .dar{transform:rotate(-90deg)}
.dl-wrap.hid{display:none}

.di{
  display:flex;align-items:center;gap:9px;padding:8px 12px;
  border-radius:9px;opacity:.55;transition:opacity .15s;animation:fIn .2s ease;
}
@keyframes fIn{from{opacity:0}to{opacity:.55}}
.di:hover{opacity:.82}
.dck{width:18px;height:18px;min-width:18px;border-radius:50%;background:#2A5C38;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
body.dk .dck{background:#48A060}
.dtx{flex:1;font-size:13px;text-decoration:line-through;opacity:.7;word-break:break-word}
.ddt{font-size:11px;opacity:.45;flex-shrink:0;text-align:right;white-space:nowrap;line-height:1.4}
.ddl{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;color:inherit}
.di:hover .ddl{opacity:.5}
.ddl:hover{opacity:1!important;color:#A8200E}
.clr-done-btn{margin-top:.6rem;font-size:11px;opacity:.4;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;color:inherit;display:none}
.clr-done-btn:hover{color:#A8200E;opacity:.8}

/* ════════ INBOX ITEM ════════ */
.inbox-item{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:10px;animation:tIn .18s ease;
}
.inbox-txt{flex:1;font-size:14px;opacity:.85}
.inbox-cats{display:flex;gap:4px;flex-shrink:0}
.icat-btn{
  padding:3px 8px;border-radius:20px;border:1px solid rgba(128,80,40,.2);
  background:transparent;cursor:pointer;font-size:11px;color:inherit;opacity:.65;
  transition:all .14s;
}
.icat-btn:hover{opacity:1}

/* ════════ TODAY VIEW ════════ */
.today-hd{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:1rem 1rem .9rem;border-radius:14px;margin-bottom:.9rem;
}
.greet{font-size:20px;font-weight:700;letter-spacing:-.02em}
.today-date{font-size:12px;opacity:.55;margin-top:3px}
.today-meta{text-align:right}
.today-count{font-size:28px;font-weight:700;color:#A8200E;line-height:1}
body.dk .today-count{color:#E04030}
.today-count-lbl{font-size:10px;opacity:.5;margin-top:2px}
.brain-dump-btn{
  width:100%;padding:11px;border-radius:12px;border:2px dashed rgba(168,32,14,.35);
  background:rgba(168,32,14,.05);cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;font-size:14px;font-weight:600;color:#A8200E;
  transition:all .15s;margin-bottom:.9rem;
}
.brain-dump-btn:hover{background:rgba(168,32,14,.1);border-color:rgba(168,32,14,.55)}
.brain-dump-btn:active{transform:scale(.97)}
body.dk .brain-dump-btn{color:#E04030;border-color:rgba(224,64,48,.35);background:rgba(224,64,48,.05)}

/* ════════ BRAIN DUMP MODAL ════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-sheet{
  width:100%;max-width:600px;border-radius:18px 18px 0 0;
  padding:1.2rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom));
  max-height:85vh;overflow-y:auto;
  animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:rgba(128,80,40,.1);cursor:pointer;font-size:16px;color:inherit;display:flex;align-items:center;justify-content:center}
.dump-area{
  width:100%;min-height:140px;border:1px solid rgba(128,80,40,.2);border-radius:11px;
  background:rgba(255,255,255,.3);color:inherit;font-size:14px;padding:12px;
  resize:vertical;outline:none;line-height:1.6;font-family:inherit;
}
body.dk .dump-area{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.dump-area::placeholder{opacity:.4}
.dump-hint{font-size:11px;opacity:.45;margin-top:5px;line-height:1.5}
.dump-result{display:none;margin-top:1rem}
.dump-result.show{display:block}
.dump-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:9px;margin-bottom:5px;animation:tIn .15s ease;
}
.dump-item-txt{flex:1;font-size:13px}
.dump-cat-sel{
  border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.4);
  color:inherit;font-size:12px;padding:3px 7px;cursor:pointer;outline:none;
}
body.dk .dump-cat-sel{background:rgba(0,0,0,.25)}
.dump-urg{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:14px;opacity:.4;transition:all .14s}
.dump-urg.on{opacity:1}
.dump-rm{width:22px;height:22px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;color:inherit;opacity:.35}
.dump-rm:hover{opacity:.8;color:#A8200E}

/* ════════ DIARY ════════ */
.diary-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem}
.diary-nav-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(128,80,40,.2);
  background:transparent;cursor:pointer;font-size:16px;color:inherit;opacity:.6;
  display:flex;align-items:center;justify-content:center;
}
.diary-nav-btn:hover{opacity:1}
.diary-date-lbl{font-size:15px;font-weight:600;letter-spacing:-.01em}
.mood-row{display:flex;gap:8px;margin-bottom:.8rem;justify-content:center}
.mood-btn{
  font-size:22px;width:40px;height:40px;border-radius:50%;border:2px solid transparent;
  background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.mood-btn:active{transform:scale(.85)}
.mood-btn.sel{border-color:rgba(168,32,14,.6);background:rgba(168,32,14,.08);transform:scale(1.15)}
.diary-area{
  width:100%;min-height:180px;border:1px solid rgba(128,80,40,.2);border-radius:12px;
  background:rgba(255,255,255,.3);color:inherit;font-size:14px;padding:12px;
  resize:none;outline:none;line-height:1.7;font-family:inherit;
  margin-bottom:.8rem;
}
body.dk .diary-area{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.diary-area::placeholder{opacity:.35}
.diary-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.8rem}
.diary-tag{
  padding:3px 10px;border-radius:20px;border:1px solid rgba(128,80,40,.2);
  font-size:12px;cursor:pointer;background:transparent;color:inherit;opacity:.6;transition:all .14s;
}
.diary-tag.sel{opacity:1;background:rgba(168,32,14,.1);border-color:rgba(168,32,14,.4);color:#A8200E}
.diary-entry-card{
  display:flex;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px;
  cursor:pointer;transition:opacity .15s;
}
.diary-entry-card:hover{opacity:.85}
.dec-date{font-size:12px;font-weight:600;flex-shrink:0;opacity:.7;min-width:48px;line-height:1.5}
.dec-mood{font-size:16px;flex-shrink:0}
.dec-preview{font-size:12px;opacity:.6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}

/* ════════ STATS ════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.75rem}
.stat-card{border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#A8200E;line-height:1.1}
body.dk .stat-num{color:#E04030}
.stat-lbl{font-size:11px;opacity:.55;margin-top:3px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:12px;opacity:.7;width:60px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:8px;border-radius:4px;background:rgba(128,80,40,.1);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#A8200E;transition:width .5s ease}
body.dk .bar-fill{background:#E04030}
.bar-ct{font-size:11px;opacity:.5;min-width:20px}
.streak-badge{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px;border-radius:12px;margin-bottom:.75rem;text-align:center;
}
.streak-num{font-size:32px;font-weight:700;color:#A8200E}
body.dk .streak-num{color:#E04030}
.streak-lbl{font-size:13px;opacity:.7}

/* ════════ SETTINGS ════════ */
.settings-section{margin-bottom:1.2rem}
.settings-section h3{font-size:12px;font-weight:700;letter-spacing:.08em;opacity:.5;text-transform:uppercase;margin-bottom:.6rem}
.setting-row{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;margin-bottom:4px;
}
.sr-label{flex:1;font-size:14px}
.sr-sub{font-size:11px;opacity:.5;margin-top:2px}
/* toggle */
.toggle{width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle.off{background:rgba(128,80,40,.2)}
.toggle.on{background:#A8200E}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.off::after{left:3px}
.toggle.on::after{left:21px}
/* cat edit */
.cat-edit-row{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:10px;margin-bottom:4px;
}
.cat-icon-sel{font-size:22px;cursor:pointer;width:32px;text-align:center}
.cat-name-inp{
  flex:1;border:none;background:transparent;font-size:14px;font-weight:500;
  color:inherit;outline:none;border-bottom:1px solid transparent;transition:border-color .15s;
}
.cat-name-inp:focus{border-bottom-color:rgba(128,80,40,.3)}
.time-inp{
  border:1px solid rgba(128,80,40,.2);border-radius:7px;background:rgba(255,255,255,.3);
  color:inherit;font-size:13px;padding:4px 8px;outline:none;
}
body.dk .time-inp{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.15)}
.export-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ════════ UNDO BAR ════════ */
#ub{
  position:fixed;bottom:calc(4.5rem + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1A0E06;color:#F0E4CC;font-size:13px;padding:10px 13px;
  border-radius:11px;display:flex;align-items:center;gap:11px;
  box-shadow:0 4px 20px rgba(0,0,0,.28);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;z-index:90;overflow:hidden;white-space:nowrap;max-width:calc(100vw - 2rem);
}
body.dk #ub{background:#F0E4CC;color:#1A0E06}
#ub.show{transform:translateX(-50%) translateY(0);opacity:1}
#um{overflow:hidden;text-overflow:ellipsis}
#ubtn{background:none;border:1px solid rgba(255,255,255,.3);color:inherit;font-size:12px;padding:3px 9px;border-radius:6px;cursor:pointer;flex-shrink:0}
body.dk #ubtn{border-color:rgba(0,0,0,.2)}
#up{position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.2);width:100%;transform-origin:left}

@media(max-width:420px){
  .stat-grid{grid-template-columns:1fr}
  .greet{font-size:18px}
}
</style>

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function $e(tag,cls='',attrs={}){const e=document.createElement(tag);if(cls)e.className=cls;Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e}
function ge(id){return document.getElementById(id)}
function todayKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function fmtKey(key){const [y,m,d]=key.split('-');return m+'/'+d}
function fmtKeyLong(key){const [y,m,d]=key.split('-');const days=['日','月','火','水','木','金','土'];const dt=new Date(key);return y+'年'+m+'月'+d+'日（'+days[dt.getDay()]+'）'}

function catById(id){return (S.cats||DEFAULT_CATS).find(c=>c.id===id)||(S.cats||DEFAULT_CATS)[0]}
function doyScene(){const n=new Date();return SCENES[Math.floor((n-new Date(n.getFullYear(),0,0))/86400000)%SCENES.length]}
function doyQuote(){const n=new Date();return QUOTES[Math.floor((n-new Date(n.getFullYear(),0,0))/86400000)%QUOTES.length]}

function dueInfo(d){
  if(!d)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(d+'T00:00:00');
  const diff=Math.round((due-today)/86400000);
  if(diff<-1)return{label:Math.abs(diff)+'日超過',cls:'ch-ov',isOv:true};
  if(diff===-1)return{label:'昨日超過',cls:'ch-ov',isOv:true};
  if(diff===0)return{label:'今日',cls:'ch-today',isOv:false};
  if(diff===1)return{label:'明日',cls:'ch-soon',isOv:false};
  if(diff<=3)return{label:diff+'日後',cls:'ch-soon',isOv:false};
  return{label:diff+'日後',cls:'ch-due',isOv:false};
}
function fmtTs(ts){
  const d=new Date(ts);
  const today=new Date();today.setHours(0,0,0,0);
  const dd=new Date(d);dd.setHours(0,0,0,0);
  const diff=Math.round((today-dd)/86400000);
  const t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  if(diff===0)return'今日 '+t;if(diff===1)return'昨日 '+t;
  return(d.getMonth()+1)+'/'+(d.getDate())+' '+t;
}
function isToday(task){
  if(task.due===todayKey())return true;
  return false;
}
function isTomorrow(task){return task.due===tomorrowKey()}
function tomorrowKey(){const n=new Date();n.setDate(n.getDate()+1);return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')}
function isOverdue(task){
  if(!task.due)return false;
  const today=new Date();today.setHours(0,0,0,0);
  return new Date(task.due+'T00:00:00')<today;
}

/* ══════════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════════ */
function saveAll(){
  try{
    localStorage.setItem('td5_tasks',JSON.stringify(S.tasks));
    localStorage.setItem('td5_done',JSON.stringify(S.done));
    localStorage.setItem('td5_diary',JSON.stringify(S.diary));
    localStorage.setItem('td5_cats',JSON.stringify(S.cats));
    localStorage.setItem('td5_settings',JSON.stringify(S.settings));
    localStorage.setItem('td5_ui',JSON.stringify({doneColl:S.ui.doneColl,inboxColl:S.ui.inboxColl}));
  }catch(e){}
}
function loadAll(){
  try{
    S.tasks=JSON.parse(localStorage.getItem('td5_tasks')||'[]');
    S.done=JSON.parse(localStorage.getItem('td5_done')||'[]');
    S.diary=JSON.parse(localStorage.getItem('td5_diary')||'{}');
    S.cats=JSON.parse(localStorage.getItem('td5_cats')||'null');
    const sv=localStorage.getItem('td5_settings');if(sv)Object.assign(S.settings,JSON.parse(sv));
    const uv=localStorage.getItem('td5_ui');if(uv){const u=JSON.parse(uv);S.ui.doneColl=u.doneColl||false;S.ui.inboxColl=u.inboxColl||false;}
  }catch(e){S.tasks=[];S.done=[];S.diary={};}
  if(!S.cats)S.cats=DEFAULT_CATS.map(c=>({...c}));
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function initScene(){
  const scene=doyScene();
  ge('bg').innerHTML=scene.svg;
  if(scene.dark)document.body.classList.add('dk');
}
function initQuote(){
  const q=doyQuote();
  const pop=ge('qpopover');
  pop.innerHTML=`<div class="ql">今日の言葉</div><div class="qt">\u201c${q.en}\u201d</div><div class="qj">${q.ja}</div><div class="qa">— ${q.au}</div>`;
  ge('qpill-btn').onclick=()=>{pop.classList.toggle('open');};
  document.addEventListener('click',e=>{if(!ge('qpill').contains(e.target))pop.classList.remove('open');});
}
function initNav(){
  const nav=ge('bnav');
  TABS.forEach(t=>{
    const b=$e('button','ntab');
    b.innerHTML=`<span class="ni">${t.icon}</span><span>${t.label}</span>`;
    if(t.id===S.ui.tab)b.classList.add('act');
    b.addEventListener('click',()=>switchTab(t.id));
    nav.appendChild(b);
  });
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function switchTab(id){
  S.ui.tab=id;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach((b,i)=>{b.classList.toggle('act',TABS[i].id===id)});
  ge('v-'+id).classList.add('active');
  render();
}
function render(){
  switch(S.ui.tab){
    case 'today':    renderToday();    break;
    case 'tasks':    renderTasks();    break;
    case 'diary':    renderDiary();    break;
    case 'stats':    renderStats();    break;
    case 'settings': renderSettings(); break;
  }
}

/* ══════════════════════════════════════════
   TASK CARD BUILDER
══════════════════════════════════════════ */
function buildTaskCard(task, opts={}){
  const {showDragHandle=false}=opts;
  const cat=catById(task.cat);
  const chip=dueInfo(task.due);

  const wrap=$e('div','tw');
  const bg=$e('div','del-bg');bg.textContent='🗑';
  wrap.appendChild(bg);

  const item=$e('div','task g');
  if(task.urgent)item.classList.add('urg-task');
  if(chip&&chip.isOv)item.classList.add('ov-task');
  item.dataset.id=task.id;

  if(showDragHandle){
    item.setAttribute('draggable','true');
    const dh=$e('div','drag-handle');
    dh.innerHTML='<span></span><span></span><span></span>';
    item.appendChild(dh);
  }

  const cb=$e('button','cb');cb.setAttribute('aria-label','完了');cb.textContent='✓';
  cb.addEventListener('click',()=>completeTask(task.id,item));
  item.appendChild(cb);

  const body=$e('div','tbody');
  const txt=$e('div','ttxt');txt.textContent=task.text;txt.title='ダブルクリックで編集';
  txt.addEventListener('dblclick',()=>startEdit(txt,task));
  body.appendChild(txt);

  const meta=$e('div','tmeta');
  const cb2=$e('span','cat-badge');
  cb2.style.color=cat.color;cb2.style.background=cat.bg;cb2.style.borderColor=cat.color+'55';
  cb2.textContent=cat.icon+' '+cat.label;
  meta.appendChild(cb2);
  if(task.urgent){const c=$e('span','chip ch-urg');c.textContent='🔥 急ぎ';meta.appendChild(c);}
  if(chip){const c=$e('span','chip '+chip.cls);c.textContent=chip.label;meta.appendChild(c);}
  body.appendChild(meta);
  item.appendChild(body);

  const acts=$e('div','tacts');
  const ub2=$e('button','tb urgb'+(task.urgent?' on':''));ub2.textContent='!';ub2.title='急ぎ';
  ub2.addEventListener('click',()=>{task.urgent=!task.urgent;saveAll();render();});
  const db2=$e('button','tb del');db2.textContent='✕';db2.title='削除';
  db2.addEventListener('click',()=>{item.classList.add('out');setTimeout(()=>{deleteTask(task.id);},270);});
  acts.appendChild(ub2);acts.appendChild(db2);
  item.appendChild(acts);
  wrap.appendChild(item);

  addSwipe(item,()=>deleteTask(task.id));
  if(showDragHandle)addDragHandlers(item,task.id);
  return wrap;
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function renderToday(){
  const v=ge('v-today');v.innerHTML='';
  const n=new Date();
  const h=n.getHours();
  const greet=h<5?'おやすみ😴':h<12?'おはよう☀️':h<18?'こんにちは👋':'こんばんは🌙';
  const days=['日','月','火','水','木','金','土'];

  // Header
  const hd=$e('div','today-hd g');
  const todayTasks=S.tasks.filter(t=>isToday(t)||t.urgent);
  hd.innerHTML=`<div><div class="greet">${greet}</div><div class="today-date">${(n.getMonth()+1)}月${n.getDate()}日（${days[n.getDay()]}）</div></div><div class="today-meta"><div class="today-count">${todayTasks.length}</div><div class="today-count-lbl">今日のタスク</div></div>`;
  v.appendChild(hd);

  // Brain dump
  const bd=$e('button','brain-dump-btn');bd.innerHTML='🧠 脳のダンプ — 頭の中を全部書き出す';
  bd.addEventListener('click',openBrainDump);v.appendChild(bd);

  // Input
  v.appendChild(buildInputCard());

  // Today's tasks
  const todayFiltered=S.tasks.filter(t=>isToday(t)||t.urgent);
  if(todayFiltered.length){
    const sh=$e('div','sec-hd');
    sh.innerHTML=`<span class="sl">今日やること</span><div class="sln"></div><span class="sbd">${todayFiltered.length}</span>`;
    v.appendChild(sh);
    const list=$e('div','');
    todayFiltered.forEach(t=>list.appendChild(buildTaskCard(t)));
    v.appendChild(list);
  } else {
    const e2=$e('div','empty-state');
    e2.innerHTML='<div class="ei">✨</div><div class="et">今日のタスクなし！いい感じ</div>';
    v.appendChild(e2);
  }

  // Inbox
  const inbox=S.tasks.filter(t=>t.cat==='inbox');
  if(inbox.length){
    const ih=$e('div','done-hd');
    ih.innerHTML=`<span class="sl">📥 Inbox</span><div class="sln"></div><span class="sbd">${inbox.length}</span><span class="dar">▾</span>`;
    ih.classList.toggle('coll',S.ui.inboxColl);
    ih.addEventListener('click',()=>{S.ui.inboxColl=!S.ui.inboxColl;saveAll();renderToday();});
    v.appendChild(ih);
    const iw=$e('div','dl-wrap');iw.classList.toggle('hid',S.ui.inboxColl);
    inbox.forEach(t=>{
      const row=$e('div','inbox-item g');
      const tx=$e('div','inbox-txt');tx.textContent=t.text;row.appendChild(tx);
      const cats2=$e('div','inbox-cats');
      S.cats.filter(c=>!c.system).slice(0,3).forEach(c=>{
        const b=$e('button','icat-btn');b.textContent=c.icon+' '+c.label;
        b.addEventListener('click',()=>{t.cat=c.id;saveAll();render();});
        cats2.appendChild(b);
      });
      const delb=$e('button','icat-btn');delb.textContent='✕';delb.style.color='#A8200E';
      delb.addEventListener('click',()=>{S.tasks=S.tasks.filter(x=>x.id!==t.id);saveAll();render();});
      cats2.appendChild(delb);
      row.appendChild(cats2);iw.appendChild(row);
    });
    v.appendChild(iw);
  }

  // Done today
  const doneToday=S.done.filter(t=>{const d=new Date(t.completedAt);const td=new Date();return d.toDateString()===td.toDateString();});
  if(doneToday.length){
    const dh2=$e('div','sec-hd');dh2.style.marginTop='1.2rem';
    dh2.innerHTML=`<span class="sl">今日完了</span><div class="sln"></div><span class="sbd">${doneToday.length}</span>`;
    v.appendChild(dh2);
    const dl2=$e('div','done-list');

function filteredTasks(){
  let list=[...S.tasks];
  if(S.ui.search){const q=S.ui.search.toLowerCase();list=list.filter(t=>t.text.toLowerCase().includes(q));}
  if(S.ui.filterDate==='today')list=list.filter(t=>isToday(t));
  else if(S.ui.filterDate==='tomorrow')list=list.filter(t=>isTomorrow(t));
  else if(S.ui.filterDate==='overdue')list=list.filter(t=>isOverdue(t));
  if(S.ui.filterCat!=='all')list=list.filter(t=>t.cat===S.ui.filterCat);
  return list.sort((a,b)=>{
    if(a.urgent!==b.urgent)return b.urgent-a.urgent;
    if(a.due&&b.due)return a.due.localeCompare(b.due);
    if(a.due)return -1;if(b.due)return 1;
    return a.created-b.created;
  });
}

function addTask(text,cat,urgent,due){
  S.tasks.push({id:Date.now(),text,cat:cat||'todo',urgent:!!urgent,due:due||null,created:Date.now()});
  saveAll();
}
function completeTask(id,el){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  if(el)el.classList.add('out');
  setTimeout(()=>{
    S.tasks=S.tasks.filter(t=>t.id!==id);
    S.done.unshift({...task,completedAt:Date.now()});
    saveAll();render();showUndo(task);
  },270);
}
function deleteTask(id){
  S.tasks=S.tasks.filter(t=>t.id!==id);saveAll();render();
}
function startEdit(el,task){
  el.contentEditable='true';el.focus();
  const r=document.createRange();r.selectNodeContents(el);
  window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}if(e.key==='Escape'){el.textContent=task.text;el.blur();}});
  el.addEventListener('blur',()=>{task.text=el.textContent.trim()||task.text;el.textContent=task.text;el.contentEditable='false';saveAll();},{once:true});
}

/* ══════════════════════════════════════════
   SWIPE TO DELETE
══════════════════════════════════════════ */
function addSwipe(el,onDelete){
  let sx,sy,drag=false,moved=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=false;moved=false;el.style.transition='none';},{passive:true});
  el.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!moved){if(Math.abs(dx)>Math.abs(dy)&&dx<-10){drag=true;moved=true;}else if(Math.abs(dy)>10)moved=true;}
    if(drag){e.preventDefault();el.style.transform='translateX('+Math.max(Math.min(dx,0),-90)+'px)';}
  },{passive:false});
  el.addEventListener('touchend',e=>{
    if(!drag)return;drag=false;
    const dx=e.changedTouches[0].clientX-sx;el.style.transition='';
    if(dx<-65){el.style.transition='transform .22s,opacity .22s';el.style.transform='translateX(-110px)';el.style.opacity='0';setTimeout(onDelete,230);}
    else el.style.transform='';
  });
}

/* ══════════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════════ */
let dragId=null;
function addDragHandlers(item,id){
  item.addEventListener('dragstart',e=>{dragId=id;item.style.opacity='0.5';e.dataTransfer.effectAllowed='move';});
  item.addEventListener('dragend',()=>{dragId=null;item.style.opacity='';document.querySelectorAll('.task').forEach(t=>t.classList.remove('drag-over'));});
  item.addEventListener('dragover',e=>{e.preventDefault();if(dragId&&dragId!==id)item.classList.add('drag-over');});
  item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
  item.addEventListener('drop',e=>{
    e.preventDefault();item.classList.remove('drag-over');
    if(!dragId||dragId===id)return;
    const fi=S.tasks.findIndex(t=>t.id===dragId);
    const ti=S.tasks.findIndex(t=>t.id===id);
    if(fi<0||ti<0)return;
    const [moved2]=S.tasks.splice(fi,1);S.tasks.splice(ti,0,moved2);
    saveAll();render();
  });
}

══════════════════════════════════════════ */
function categorizeText(text){
  const t=text.toLowerCase();
  if(/ジム|gym|筋トレ|workout|運動|walk|散歩|食事|飯|meal|料理|cook|shower|風呂|sleep|寝|掃除|clean|洗濯/.test(t))return'daily';
  if(/アイデア|idea|案|maybe|もしかし|どうかな|ビジネス|business|startup|事業|収益|サービス|service|プロダクト|product|考え|what if/.test(t))return'idea';
  if(/行く|go to|visit|カフェ|café|cafe|restaurant|レストラン|店|shop|場所|place|where|どこ|location|スポット/.test(t))return'place';
  if(/メモ|note|覚え|remember|忘れ|情報|info|資料|data|パスワード|password|連絡先|contact|調べ|research/.test(t))return'memo';
  return'todo';
}
function openBrainDump(){
  ge('bd-overlay').classList.add('open');
  ge('dump-area').focus();
  ge('dump-add-all').style.display='none';
  ge('dump-result').className='dump-result';
  ge('dump-result').innerHTML='';
  dumpItems=[];
}
function closeBrainDump(){ge('bd-overlay').classList.remove('open');}
function organizeDump(){
  const raw=ge('dump-area').value.trim();
  if(!raw)return;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  dumpItems=lines.map((text,i)=>({id:i,text,cat:categorizeText(text),urgent:false}));
  const res=ge('dump-result');res.className='dump-result show';res.innerHTML='';
  dumpItems.forEach(item=>{
    const row=$e('div','dump-item g');
    const tx=$e('div','dump-item-txt');tx.textContent=item.text;
    const sel=$e('select','dump-cat-sel');
    S.cats.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.icon+' '+c.label;if(c.id===item.cat)o.selected=true;sel.appendChild(o);});
    sel.addEventListener('change',()=>{item.cat=sel.value;});
    const urg=$e('button','dump-urg');urg.textContent='🔥';urg.title='急ぎ';
    urg.addEventListener('click',()=>{item.urgent=!item.urgent;urg.classList.toggle('on',item.urgent);});
    const rm=$e('button','dump-rm');rm.textContent='✕';
    rm.addEventListener('click',()=>{dumpItems=dumpItems.filter(d=>d.id!==item.id);row.remove();if(!dumpItems.length)ge('dump-add-all').style.display='none';});
    row.appendChild(tx);row.appendChild(sel);row.appendChild(urg);row.appendChild(rm);
    res.appendChild(row);
  });
  ge('dump-add-all').style.display=dumpItems.length?'flex':'none';
}
function addAllDump(){
  dumpItems.forEach(item=>{if(item.text)addTask(item.text,item.cat,item.urgent,null);});
  saveAll();closeBrainDump();ge('dump-area').value='';dumpItems=[];render();
}

ge('dump-add-all').addEventListener('click',addAllDump);

    ntog.className='toggle '+(S.settings.notifEnabled?'on':'off');saveAll();

  notifRow.appendChild(nl);notifRow.appendChild(ntog);s2.appendChild(notifRow);

  [['notifMorning','朝の通知（今日の予定）'],['notifEvening','夜の振り返り']].forEach(([key,label])=>{
    const row=$e('div','setting-row g');
    const l=$e('div','sr-label');l.textContent=label;
    const ti=$e('input','time-inp');ti.type='time';ti.value=S.settings[key];
    ti.addEventListener('change',()=>{S.settings[key]=ti.value;saveAll();scheduleNotifications();});
    row.appendChild(l);row.appendChild(ti);s2.appendChild(row);
  });
  const dlrow=$e('div','setting-row g');
  const dll=$e('div','');dll.innerHTML='<div class="sr-label">期限アラート</div><div class="sr-sub">今日/明日期限のタスクを通知</div>';
  const dltog=$e('button','toggle '+(S.settings.notifDeadline?'on':'off'));
  dltog.addEventListener('click',()=>{S.settings.notifDeadline=!S.settings.notifDeadline;dltog.className='toggle '+(S.settings.notifDeadline?'on':'off');saveAll();});
  dlrow.appendChild(dll);dlrow.appendChild(dltog);s2.appendChild(dlrow);
  v.appendChild(s2);

  // Export/Import
  const s3=$e('div','settings-section');s3.innerHTML='<h3>データ</h3>';
  const expRow=$e('div','setting-row g');
  const el2=$e('div','sr-label');el2.textContent='エクスポート / インポート';
  const btns=$e('div','export-btns');btns.style.marginTop='.3rem';
  const exb=$e('button','btn-sm');exb.textContent='⬇️ エクスポート';exb.addEventListener('click',exportData);
  const imb=$e('button','btn-sm');imb.textContent='⬆️ インポート';imb.addEventListener('click',importData);
  btns.appendChild(exb);btns.appendChild(imb);
  expRow.style.flexDirection='column';expRow.style.alignItems='flex-start';
  expRow.appendChild(el2);expRow.appendChild(btns);s3.appendChild(expRow);
  v.appendChild(s3);

  // About
  const s4=$e('div','settings-section');s4.innerHTML='<h3>このアプリについて</h3>';
  const arow=$e('div','setting-row g');
  arow.innerHTML='<div><div class="sr-label">Todo v5</div><div class="sr-sub">データはこのデバイスのみに保存。外部送信なし。</div></div>';
  s4.appendChild(arow);
  const pwrow=$e('div','setting-row g');
  pwrow.innerHTML='<div><div class="sr-label">📱 iOSにインストール</div><div class="sr-sub">Safariで開く → 共有ボタン → 「ホーム画面に追加」</div></div>';
  s4.appendChild(pwrow);
  v.appendChild(s4);
}

/* ══════════════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════════════ */
function exportData(){
  const data={tasks:S.tasks,done:S.done,diary:S.diary,cats:S.cats,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='todo_backup_'+todayKey()+'.json';a.click();
  URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.addEventListener('change',()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(d.tasks)S.tasks=d.tasks;
        if(d.done)S.done=d.done;
        if(d.diary)S.diary=d.diary;
        if(d.cats)S.cats=d.cats;
        saveAll();render();
        alert('インポート完了！');
      }catch(err){alert('エラー: ファイルが正しくありません');}
    };
    r.readAsText(f);
  });
  inp.click();
}

/* ══════════════════════════════════════════
   UNDO
══════════════════════════════════════════ */
function showUndo(task){
  clearTimeout(undoTimer);undoTask=task;
  ge('um').textContent='「'+task.text.slice(0,14)+(task.text.length>14?'…':'')+'」を完了';
  const ub=ge('ub');ub.classList.add('show');
  const up=ge('up');up.style.transition='none';up.style.transform='scaleX(1)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{up.style.transition='transform 4.2s linear';up.style.transform='scaleX(0)';}));
  undoTimer=setTimeout(()=>{ub.classList.remove('show');undoTask=null;},4300);
}
ge('ubtn').addEventListener('click',()=>{
  if(!undoTask)return;clearTimeout(undoTimer);
  S.done=S.done.filter(d=>d.id!==undoTask.id);S.tasks.push(undoTask);undoTask=null;
  ge('ub').classList.remove('show');saveAll();render();
});

/* ══════════════════════════════════════════
   NOTIFICATIONS
══════════════════════════════════════════ */
function scheduleNotifications(){
  if(notifIntervalId)clearInterval(notifIntervalId);
  if(!S.settings.notifEnabled||Notification.permission!=='granted')return;
  notifIntervalId=setInterval(checkNotifications,60000);
  checkNotifications();
}
function checkNotifications(){
  if(!S.settings.notifEnabled||Notification.permission!=='granted')return;
  const n=new Date();
  const hm=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const todayTasks=S.tasks.filter(t=>isToday(t)||t.urgent);
  if(hm===S.settings.notifMorning&&todayTasks.length){
    new Notification('☀️ 今日の予定',{body:`今日のタスク: ${todayTasks.length}件\n${todayTasks.slice(0,3).map(t=>t.text).join('\n')}`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="%23A8200E"/></svg>'});
  }
  if(hm===S.settings.notifEvening){
    const doneToday2=S.done.filter(t=>{const d=new Date(t.completedAt);return d.toDateString()===new Date().toDateString();}).length;
    new Notification('🌙 夜の振り返り',{body:`今日完了: ${doneToday2}件\n残りタスク: ${S.tasks.length}件\nお疲れ様！`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="%23A8200E"/></svg>'});
  }
  if(S.settings.notifDeadline){
    const due=S.tasks.filter(t=>isToday(t)&&!t.urgent);
    if(due.length&&hm==='09:00'){new Notification('⏰ 今日が期限です',{body:due.map(t=>t.text).join('\n')});}
  }
}

/* ══════════════════════════════════════════
   KEYBOARD SHORTCUT
══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault();
    const inp=document.querySelector('.task-inp');if(inp)inp.focus();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='b'){e.preventDefault();openBrainDump();}
});

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
loadAll();
initScene();
initQuote();
initNav();
render();
if(S.settings.notifEnabled)scheduleNotifications();
</script>
